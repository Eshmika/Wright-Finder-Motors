<div id="view-buy-view-all" class="view">
  <div class="view-header">
    <div class="view-title">
      <i class="fas fa-car-side title-icon"></i>
      View All Cars
    </div>
    <div class="view-subtitle">
      Browse and manage all vehicles in the inventory.
    </div>
  </div>

  <div class="search-bar-container">
    <input
      type="text"
      id="carSearchInput"
      class="form-control"
      placeholder="Search by Car ID, Name, Model, Year, or Status..."
    />
    <button id="btnSearchCars" class="btn-primary">
      <i class="fas fa-search"></i> Search
    </button>
    <button id="btnResetSearch" class="btn-secondary">
      <i class="fas fa-sync-alt"></i> Reset
    </button>
  </div>

  <div class="table-responsive">
    <table class="cars-table" id="carsTable">
      <thead>
        <tr>
          <th>Image</th>
          <th>Car ID</th>
          <th>Car Name</th>
          <th>Model & Year</th>
          <th>Price</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="carsTableBody">
        <tr>
          <td colspan="6" class="text-center">Loading vehicles...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Detailed Car Page View -->
<div id="view-car-details" class="view">
  <div
    class="view-header"
    style="
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(135deg, var(--primary), #3b5bdb);
      padding: 25px 30px;
      border-radius: 12px;
      margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(78, 115, 223, 0.2);
    "
  >
    <div>
      <div
        class="view-title"
        id="pageCarTitle"
        style="font-size: 2rem; font-weight: 700; color: white"
      >
        <i class="fas fa-car title-icon"></i> Car Details
      </div>
      <div
        class="view-subtitle"
        id="pageCarSubtitle"
        style="
          color: rgba(255, 255, 255, 0.9);
          font-size: 1.1rem;
          margin-top: 5px;
        "
      ></div>
    </div>
    <div style="display: flex; gap: 10px">
      <button
        id="btnEditCarDetails"
        style="
          padding: 10px 20px;
          font-weight: bold;
          border-radius: 8px;
          background: #f6c23e;
          color: #fff;
          border: none;
          box-shadow: 0 4px 6px rgba(246, 194, 62, 0.3);
          transition: all 0.3s ease;
          cursor: pointer;
          display: flex;
          align-items: center;
          gap: 8px;
        "
        onmouseover="this.style.background = '#dda20a'"
        onmouseout="this.style.background = '#f6c23e'"
      >
        <i class="fas fa-edit"></i> <span id="editBtnText">Edit Details</span>
      </button>

      <button
        class="btn-secondary"
        id="btnBackToCars"
        style="
          padding: 10px 20px;
          font-weight: bold;
          border-radius: 8px;
          background: rgba(255, 255, 255, 0.2);
          color: white;
          backdrop-filter: blur(5px);
          border: 1px solid rgba(255, 255, 255, 0.3);
          transition: all 0.3s ease;
        "
        onmouseover="this.style.background = 'rgba(255, 255, 255, 0.3)'"
        onmouseout="this.style.background = 'rgba(255, 255, 255, 0.2)'"
      >
        <i class="fas fa-arrow-left"></i> Back to Cars
      </button>
    </div>
  </div>

  <div class="creative-car-grid">
    <div class="car-gallery-section banner-card">
      <div
        class="main-image-display hero-image-container"
        id="pageMainImageContainer"
      >
        <!-- Main image will be loaded here -->
      </div>
      <div class="sub-images-display image-strip" id="pageSubImagesContainer">
        <!-- Sub images will be loaded here -->
      </div>
    </div>

    <div class="car-specs-section">
      <!-- Edit Mode Container (Hidden by Default) -->
      <div id="pageCarEditMode" class="spec-card" style="display: none">
        <h4><i class="fas fa-edit"></i> Edit Car Information</h4>
        <form id="carEditForm" class="creative-form" style="margin-top: 20px">
          <div class="grid-responsive" id="editFormFieldsGrid">
            <!-- Fields will go here -->
          </div>
          <div style="margin-top: 20px; text-align: right">
            <button
              type="button"
              id="btnCancelEdit"
              class="btn-secondary"
              style="
                padding: 10px 20px;
                border: none;
                border-radius: 8px;
                margin-right: 10px;
              "
            >
              Cancel
            </button>
            <button
              type="submit"
              class="btn-success"
              style="
                padding: 10px 20px;
                border: none;
                border-radius: 8px;
                background: #1cc88a;
                color: white;
                font-weight: bold;
              "
            >
              <i class="fas fa-save"></i> Save Changes
            </button>
          </div>
        </form>
      </div>

      <!-- View Mode Containers -->
      <div id="pageCarViewMode">
        <div class="spec-card price-card">
          <div class="price-info-container">
            <h3 id="pageCarPrice" class="display-price"></h3>
            <div
              id="pageCarDiscount"
              class="discount-badge"
              style="display: none"
            ></div>
          </div>
          <p class="status-badge-lg" id="pageCarStatus"></p>
        </div>

        <div class="spec-card info-card">
          <h4><i class="fas fa-clipboard-list"></i> Key Specifications</h4>
          <div class="spec-grid" id="pageCarInfo">
            <div style="padding: 20px; text-align: center; color: #858796">
              <i class="fas fa-spinner fa-spin fa-2x"></i>
              <p style="margin-top: 10px">Loading specifications...</p>
            </div>
          </div>
        </div>

        <div
          class="spec-card desc-card"
          id="pageCarDescCard"
          style="display: none"
        >
          <h4><i class="fas fa-align-left"></i> Description</h4>
          <div id="pageCarDescription" class="desc-content"></div>
        </div>
      </div>
    </div>
  </div>
</div>
