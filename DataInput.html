<div id="view-data-input" class="view form-view">
  <div class="view-header">
    <h1 class="view-title">
      <i class="fas fa-keyboard title-icon"></i> Data Input
    </h1>
    <p class="view-subtitle">
      Quickly input and save detailed vehicle data into the database.
    </p>
  </div>

  <div class="spec-card info-card" style="margin-top: 20px">
    <h4><i class="fas fa-clipboard-list"></i> Data Input Form</h4>
    <form
      id="dataInputForm"
      class="creative-form"
      onsubmit="handleDataInputSubmit(event)"
      style="margin-top: 20px"
    >
      <!-- Vehicle Information -->
      <div class="form-section shadow-sm">
        <h3 class="section-title">
          <span class="icon-wrap"><i class="fas fa-car"></i></span>
          Vehicle Information
        </h3>
        <div class="grid-responsive">
          <div class="input-group">
            <label>Make</label>
            <select
              name="carName"
              id="dataInputCarNameSelect"
              class="form-control"
              required
            >
              <option value="">Select Make...</option>
            </select>
          </div>
          <div class="input-group">
            <label>Model</label>
            <select
              name="model"
              id="dataInputModelSelect"
              class="form-control"
              required
            >
              <option value="">Select Model...</option>
            </select>
          </div>
          <div class="input-group">
            <label>Trim</label>
            <select name="trim" id="dataInputTrimSelect" class="form-control">
              <option value="">Select Trim...</option>
            </select>
          </div>
          <div class="input-group">
            <label>Year</label>
            <select
              name="year"
              id="dataInputYearSelect"
              class="form-control"
              required
            >
              <option value="">Select Year...</option>
            </select>
          </div>
          <div class="input-group">
            <label>Fuel Type</label>
            <select
              name="fuelType"
              id="dataInputFuelTypeSelect"
              class="form-control"
            >
              <option value="">Select Fuel...</option>
            </select>
          </div>
          <div class="input-group">
            <label>Body Style</label>
            <select
              name="bodyStyle"
              id="dataInputBodyStyleSelect"
              class="form-control"
            >
              <option value="">Select Body Style...</option>
            </select>
          </div>
          <div class="input-group">
            <label>Mileage</label>
            <input
              type="text"
              name="mileage"
              class="form-control"
              maxlength="7"
              placeholder="e.g. 120,000"
              pattern="[0-9,]+"
              title="Only numbers and commas limit 6-7 char"
            />
          </div>
          <div class="input-group">
            <label>Title</label>
            <select name="title" id="dataInputTitleSelect" class="form-control">
              <option value="">Select Title...</option>
              <option>Clean</option>
              <option>Rebuilt</option>
              <option>Lien</option>
              <option>Salvage</option>
              <option>None</option>
              <option>Other</option>
            </select>
            <input
              type="text"
              id="dataInputTitleCustom"
              class="form-control mt-2"
              placeholder="Enter custom title"
              style="display: none"
            />
          </div>
          <div class="input-group">
            <label>VIN</label>
            <input
              type="text"
              name="vin"
              class="form-control"
              maxlength="17"
              pattern=".{17}"
              title="Must be exactly 17 characters"
              placeholder="17 Characters"
            />
          </div>
          <div class="input-group">
            <label>Purchase Date</label>
            <input type="date" name="purchaseDate" class="form-control" />
          </div>
        </div>
      </div>

      <!-- Pricing Information -->
      <div class="form-section shadow-sm">
        <h3 class="section-title">
          <span class="icon-wrap"><i class="fas fa-dollar-sign"></i></span>
          Pricing & Purchase Information
        </h3>

        <!-- Source Type Selector -->
        <div class="grid-responsive" style="margin-bottom: 25px">
          <div class="input-group">
            <label class="required-label">Source Type</label>
            <div class="modern-input-wrapper" style="position: relative">
              <select
                name="sourceType"
                id="dataInputSourceType"
                class="form-control"
                required
                onchange="window.toggleSourceFields()"
              >
                <option value="IAAI">IAAI</option>
                <option value="Private/Partner">Private/Partner</option>
                <option value="Trade">Trade</option>
              </select>
              <i
                class="fas fa-shopping-cart"
                style="
                  position: absolute;
                  left: 16px;
                  top: 50%;
                  transform: translateY(-50%);
                  color: #b7b9cc;
                "
              ></i>
            </div>
          </div>
        </div>

        <!-- IAAI Fields Group -->
        <div id="source-iaai-fields" class="grid-responsive">
          <div class="input-group">
            <label>IAAI Price Before Fees / Tax</label>
            <input
              type="number"
              name="iaaiPriceBeforeFees"
              class="form-control"
              step="0.01"
            />
          </div>
          <div class="input-group">
            <label>IAAI TOTAL PRICE W/ FEES</label>
            <input
              type="number"
              name="iaaiTotalPrice"
              class="form-control"
              step="0.01"
            />
          </div>
          <div class="input-group">
            <label>PAPE PRICE</label>
            <input
              type="number"
              name="papePrice"
              class="form-control"
              step="0.01"
            />
          </div>
        </div>

        <!-- Private/Partner Fields Group -->
        <div
          id="source-private-fields"
          class="grid-responsive"
          style="display: none"
        >
          <div class="input-group">
            <label>Seller Name</label>
            <input
              type="text"
              name="sellerName"
              class="form-control"
              placeholder="e.g. John Doe, Partner Co."
            />
          </div>
          <div class="input-group">
            <label>Acquisition Date</label>
            <input type="date" name="acquisitionDate" class="form-control" />
          </div>
          <div class="input-group">
            <label>Purchase Price ($)</label>
            <input
              type="number"
              name="purchasePrice"
              class="form-control"
              step="0.01"
              placeholder="0.00"
            />
          </div>
          <div class="input-group" style="grid-column: 1 / -1">
            <label>Notes</label>
            <textarea
              name="privateNotes"
              class="form-control"
              rows="2"
              placeholder="Private purchase details or agreements..."
            ></textarea>
          </div>
        </div>

        <!-- Trade Fields Group -->
        <div
          id="source-trade-fields"
          class="grid-responsive"
          style="display: none"
        >
          <div class="input-group">
            <label>Car Name (Purchased Vehicle)</label>
            <input
              type="text"
              name="tradeCarName"
              class="form-control"
              placeholder="e.g. 2018 Toyota Camry"
            />
          </div>
          <div class="input-group">
            <label>Trade Value ($)</label>
            <input
              type="number"
              name="tradeValue"
              class="form-control"
              step="0.01"
              placeholder="0.00"
            />
          </div>
          <div class="input-group">
            <label>Traded Car Description</label>
            <input
              type="text"
              name="tradeIn"
              class="form-control"
              placeholder="e.g. 2015 Honda Civic (Trade-In)"
            />
          </div>
          <div class="input-group" style="grid-column: 1 / -1">
            <label>Comment / Notes</label>
            <textarea
              name="tradeComment"
              class="form-control"
              rows="2"
              placeholder="Add trade details here..."
            ></textarea>
          </div>
        </div>
      </div>

      <!-- Dispatcher Information -->
      <div class="form-section shadow-sm">
        <h3 class="section-title">
          <span class="icon-wrap"><i class="fas fa-headset"></i></span>
          Dispatcher Information
        </h3>
        <div class="grid-responsive">
          <div class="input-group">
            <label>Dispatcher Name</label>
            <input type="text" name="dispatcherName" class="form-control" />
          </div>
          <div class="input-group">
            <label>Dispatcher Phone</label>
            <input
              type="tel"
              name="dispatcherPhone"
              class="form-control"
              oninput="formatPhoneNumber(this)"
              placeholder="(123) 456-7890"
              maxlength="14"
            />
          </div>
          <div class="input-group">
            <label>Dispatcher Price</label>
            <input
              type="number"
              name="dispatcherPrice"
              class="form-control"
              step="0.01"
            />
          </div>
          <div class="input-group">
            <label>PURCHASE DATE</label>
            <input type="date" name="purchaseDate" class="form-control" />
          </div>
        </div>
      </div>

      <!-- Client Information -->
      <div class="form-section shadow-sm">
        <h3 class="section-title">
          <span class="icon-wrap"><i class="fas fa-user-tie"></i></span>
          Client Information
        </h3>
        <div class="grid-responsive">
          <div class="input-group">
            <label>CLIENT NAME</label>
            <input type="text" name="clientName" class="form-control" />
          </div>
          <div class="input-group">
            <label>Client Phone</label>
            <input
              type="tel"
              name="clientPhone"
              class="form-control"
              oninput="formatPhoneNumber(this)"
              placeholder="(123) 456-7890"
              maxlength="14"
            />
          </div>
          <div class="input-group">
            <label>Client Email</label>
            <input type="email" name="clientEmail" class="form-control" />
          </div>
        </div>
      </div>

      <!-- Transportation Information -->
      <div class="form-section shadow-sm">
        <h3 class="section-title">
          <span class="icon-wrap"><i class="fas fa-truck"></i></span>
          Transportation Information
        </h3>
        <div class="grid-responsive">
          <div class="input-group">
            <label>TRANSPORT FEES</label>
            <input
              type="number"
              name="transportFees"
              class="form-control"
              step="0.01"
            />
          </div>
          <div class="input-group">
            <label>CAR PICKUP LOCATION</label>
            <input type="text" name="pickupLocation" class="form-control" />
          </div>
          <div class="input-group">
            <label>DRIVER NAME</label>
            <input type="text" name="driverName" class="form-control" />
          </div>
          <div class="input-group">
            <label>Driver Phone</label>
            <input
              type="tel"
              name="driverPhone"
              class="form-control"
              oninput="formatPhoneNumber(this)"
              placeholder="(123) 456-7890"
              maxlength="14"
            />
          </div>
          <div class="input-group">
            <label>Driver Company</label>
            <input type="text" name="driverCompany" class="form-control" />
          </div>
          <div class="input-group" style="grid-column: 1 / -1">
            <label>Driver Information</label>
            <textarea
              name="driverInformation"
              rows="3"
              class="form-control"
              placeholder="Enter any additional driver details here..."
            ></textarea>
          </div>
        </div>
      </div>

      <!-- Notes -->
      <div class="form-section shadow-sm">
        <h3 class="section-title">
          <span class="icon-wrap"><i class="fas fa-sticky-note"></i></span>
          Notes
        </h3>
        <div class="input-group mt-4">
          <textarea
            name="notes"
            rows="4"
            class="form-control"
            placeholder="Enter any additional notes here..."
          ></textarea>
        </div>
      </div>

      <div
        class="form-actions glass-panel"
        style="display: flex; justify-content: flex-end; gap: 15px"
      >
        <button
          type="button"
          class="btn-secondary"
          onclick="
            document.getElementById('dataInputForm').reset();
            window.toggleSourceFields();
          "
          style="padding: 10px 20px; border-radius: 8px; font-weight: bold"
        >
          <i class="fas fa-eraser"></i> Clear all
        </button>
        <button
          type="submit"
          class="btn-success"
          id="btnSubmitDataInput"
          style="
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #232754;
            color: white;
            font-weight: bold;
            cursor: pointer;
          "
        >
          <i class="fas fa-save"></i> Save data
        </button>
      </div>
    </form>
  </div>
</div>

<script>
  // Dynamic Title selection toggle
  document.addEventListener("DOMContentLoaded", function () {
    const titleSelect = document.getElementById("dataInputTitleSelect");
    const customTitleInput = document.getElementById("dataInputTitleCustom");
    if (titleSelect && customTitleInput) {
      titleSelect.addEventListener("change", function () {
        if (this.value === "Other") {
          customTitleInput.style.display = "block";
          customTitleInput.required = true;
        } else {
          customTitleInput.style.display = "none";
          customTitleInput.required = false;
          customTitleInput.value = "";
        }
      });
    }
  });

  window.toggleSourceFields = function () {
    const sourceType = document.getElementById("dataInputSourceType").value;

    const iaaiFields = document.getElementById("source-iaai-fields");
    const privateFields = document.getElementById("source-private-fields");
    const tradeFields = document.getElementById("source-trade-fields");

    // Hide all first
    iaaiFields.style.display = "none";
    privateFields.style.display = "none";
    tradeFields.style.display = "none";

    // Show correct section
    if (sourceType === "IAAI") {
      iaaiFields.style.display = "grid";
    } else if (sourceType === "Private/Partner") {
      privateFields.style.display = "grid";
    } else if (sourceType === "Trade") {
      tradeFields.style.display = "grid";
    }
  };

  function formatPhoneNumber(input) {
    // Strip all characters from the input except digits
    let val = input.value.replace(/\D/g, "");

    // Format based on the length
    if (val.length > 0) {
      if (val.length <= 3) {
        val = "(" + val;
      } else if (val.length <= 6) {
        val = "(" + val.slice(0, 3) + ") " + val.slice(3);
      } else {
        val =
          "(" +
          val.slice(0, 3) +
          ") " +
          val.slice(3, 6) +
          "-" +
          val.slice(6, 10);
      }
    }

    // Set the formatted value back to the input
    input.value = val;
  }

  function handleDataInputSubmit(e) {
    e.preventDefault();
    const form = document.getElementById("dataInputForm");
    const btn = document.getElementById("btnSubmitDataInput");
    const originalText = btn.innerHTML;

    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
    btn.disabled = true;

    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());

    // Handle custom Title value if "Other" is selected
    if (data.title === "Other") {
      const customField = document.getElementById("dataInputTitleCustom");
      if (customField) data.title = customField.value;
    }

    google.script.run
      .withSuccessHandler(function (response) {
        if (response === "Success") {
          if (typeof showCreativeSuccessModal === "function") {
            showCreativeSuccessModal("Data Input saved successfully!");
          } else {
            alert("Data Input saved successfully!");
          }
          form.reset();
          const customTitleInput = document.getElementById(
            "dataInputTitleCustom",
          );
          if (customTitleInput) {
            customTitleInput.style.display = "none";
            customTitleInput.required = false;
          }
          // Reset fields visibility
          window.toggleSourceFields();
        } else {
          alert("Error: " + response);
        }
        btn.innerHTML = originalText;
        btn.disabled = false;
      })
      .withFailureHandler(function (error) {
        alert("Error: " + error.message);
        btn.innerHTML = originalText;
        btn.disabled = false;
      })
      .saveDataInput(data);
  }
</script>
