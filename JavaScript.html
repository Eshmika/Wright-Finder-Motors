<script>
  function formatPhoneNumber(input) {
    // Strip all characters from the input except digits
    let val = input.value.replace(/\D/g, "");

    // Format based on the length
    if (val.length > 0) {
      if (val.length <= 3) {
        val = "(" + val;
      } else if (val.length <= 6) {
        val = "(" + val.slice(0, 3) + ") " + val.slice(3);
      } else {
        val =
          "(" +
          val.slice(0, 3) +
          ") " +
          val.slice(3, 6) +
          "-" +
          val.slice(6, 10);
      }
    }

    // Set the formatted value back to the input
    input.value = val;
  }

  window.formatCurrency = function (value) {
    if (!value && value !== 0) return "$0";
    const num =
      typeof value === "string"
        ? parseFloat(value.replace(/[^0-9.-]+/g, ""))
        : value;
    return new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
      minimumFractionDigits: 0,
      maximumFractionDigits: 0,
    }).format(num);
  };

  window.formatDateToET = function (dateVal) {
    if (!dateVal) return "-";
    try {
      if (typeof dateVal === "string") {
        const trimmed = dateVal.trim();
        if (/^\d{4}-\d{2}-\d{2}$/.test(trimmed)) {
          const parts = trimmed.split("-");
          return `${parts[1]}/${parts[2]}/${parts[0]}`;
        }
        if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(trimmed)) {
          return trimmed;
        }
      }
      let d = new Date(dateVal);
      if (isNaN(d.getTime())) return dateVal;
      return d.toLocaleDateString("en-US", {
        timeZone: "America/New_York",
      });
    } catch (e) {
      return dateVal;
    }
  };

  document.addEventListener("DOMContentLoaded", function () {
    // Sidebar Toggle Logic
    const sidebarToggle = document.getElementById("sidebarToggle");
    const sidebarCreativeToggle = document.getElementById(
      "sidebarCreativeToggle",
    );
    const sidebar = document.getElementById("sidebar");

    function toggleSidebar() {
      if (window.innerWidth <= 768) {
        // On mobile, toggle 'open' class for off-canvas effect
        sidebar.classList.toggle("open");
      } else {
        // On desktop, toggle 'collapsed' class
        sidebar.classList.toggle("collapsed");
      }
    }

    if (sidebarToggle && sidebar) {
      sidebarToggle.addEventListener("click", toggleSidebar);
    }

    if (sidebarCreativeToggle && sidebar) {
      sidebarCreativeToggle.addEventListener("click", toggleSidebar);
    }

    // Close sidebar on mobile when a link is clicked
    function closeSidebarOnMobile() {
      if (window.innerWidth <= 768 && sidebar.classList.contains("open")) {
        sidebar.classList.remove("open");
      }
    }

    // Navigation logic
    const allNavLinks = document.querySelectorAll(
      ".nav-link[data-view], .submenu a[data-view]",
    );
    const topBarTitle = document.querySelector(".topbar h2");
    const viewDashboard = document.getElementById("view-dashboard");
    const viewPlaceholder = document.getElementById("view-placeholder");
    const placeholderTitle = document.getElementById("placeholder-title");

    allNavLinks.forEach((link) => {
      link.addEventListener("click", function (e) {
        // Only prevent default if it's not a submenu parent
        if (
          !this.classList.contains("nav-link") ||
          !this.parentElement.classList.contains("has-submenu")
        ) {
          e.preventDefault();
          closeSidebarOnMobile();

          // Remove active class from all links
          document
            .querySelectorAll(".nav-menu a")
            .forEach((a) => a.classList.remove("active"));
          document
            .querySelectorAll(".nav-item")
            .forEach((li) => li.classList.remove("active"));

          // Add active class to clicked link
          this.classList.add("active");
          if (this.closest(".submenu")) {
            this.closest(".has-submenu").classList.add("active");
          } else {
            this.parentElement.classList.add("active");
          }

          // Handle view switching
          const targetView = this.getAttribute("data-view");
          let viewTitle = this.textContent.trim();

          // Prefix parent title if in submenu
          if (this.closest(".submenu")) {
            const parentTitle = this.closest(".has-submenu")
              .querySelector(".nav-text")
              .textContent.trim();
            viewTitle = parentTitle + " / " + viewTitle;
          }

          topBarTitle.textContent = viewTitle;

          // Hide back button and clear last editing car when navigating via sidebar
          const backBtn = document.getElementById("dataInputBackBtn");
          if (backBtn) backBtn.style.display = "none";
          window.lastEditingCar = null;

          // Hide all views
          document
            .querySelectorAll(".view")
            .forEach((v) => v.classList.remove("active"));

          const specificView = document.getElementById("view-" + targetView);

          if (specificView) {
            specificView.classList.add("active");

            // If View All Cars is opened, load the data
            if (targetView === "buy-view-all") {
              loadCars();
            }
            // If All Expenses is opened, load expenses data
            else if (targetView === "all-expenses") {
              initExpensesView();
            }
            // If Payment is opened, load payment data
            else if (targetView === "payment") {
              initPaymentView();
            }
            // If WFM Business Expenses is opened, load business expenses data
            else if (targetView === "wfm-expenses") {
              initWfmExpensesView();
            }
            // If Other Expenses is opened, load other expenses data
            else if (targetView === "other-expenses") {
              initOtherExpensesView();
            }
            // If Loan Agreement or Inbox Chat is opened, load data
            else if (
              targetView === "loan-agreement" ||
              targetView === "inbox-chat" ||
              targetView === "communication"
            ) {
              initCommunicationView();
            }
            // If Add New Car is opened, load car list
            else if (targetView === "buy-add-new") {
              initAddNewCarView();
            }
            // If Data Input is opened, load car list
            else if (targetView === "data-input") {
              initDataInputView();
            }
            // If Update Car List is opened, load reference car list
            else if (targetView === "update-car-list") {
              initUpdateCarListView();
            }
          } else {
            viewPlaceholder.classList.add("active");
            placeholderTitle.textContent = viewTitle + " Content Goes Here";

            // Generate some creative CTA based on the section
            let ctaAction = "Process";
            if (targetView.includes("add")) ctaAction = "Add Car";
            if (targetView.includes("view")) ctaAction = "Refresh List";
            if (targetView.includes("booking")) ctaAction = "New Booking";

            // Re-render placeholder content
            viewPlaceholder.innerHTML = `
              <h1>${viewTitle}</h1>
              <p style="margin-top: 15px; color: #555;">This section is currently under construction. Here you will manage ${viewTitle.toLowerCase()}.</p>
              <div style="margin-top: 30px;">
                 <button class="btn-primary" onclick="alert('${ctaAction} initiated!')">
                   <i class="fas fa-location-arrow"></i> ${ctaAction}
                 </button>
              </div>
            `;
          }
        }
      });
    });

    // Toggle submenus on click
    document.querySelectorAll(".has-submenu > a").forEach((link) => {
      link.addEventListener("click", function (e) {
        e.preventDefault();
        const parent = this.parentElement;
        parent.classList.toggle("open");
      });
    });

    // Populate Year Dropdowns (1990 - 2050)
    const yearSelect = document.getElementById("yearSelect");
    if (yearSelect) {
      for (let y = 1990; y <= 2050; y++) {
        let opt = document.createElement("option");
        opt.value = y;
        opt.textContent = y;
        yearSelect.appendChild(opt);
      }
    }

    const dataInputYearSelect = document.getElementById("dataInputYearSelect");
    if (dataInputYearSelect) {
      for (let y = 1990; y <= 2050; y++) {
        let opt = document.createElement("option");
        opt.value = y;
        opt.textContent = y;
        dataInputYearSelect.appendChild(opt);
      }
    }

    // Handles the Interior Features tags input
    const featureInput = document.getElementById("featureInput");
    const featuresList = document.getElementById("featuresList");
    const hiddenFeatures = document.getElementById("hiddenFeatures");
    let features = [];

    if (featureInput) {
      featureInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === "," || e.key === " ") {
          e.preventDefault();
          const val = this.value.trim().replace(/,/g, "");
          if (val && !features.includes(val)) {
            features.push(val);
            renderFeatures();
          }
          this.value = "";
        }
      });
    }

    function renderFeatures() {
      featuresList.innerHTML = "";
      features.forEach((feat, index) => {
        const li = document.createElement("li");
        li.innerHTML = `${feat} <i class="fas fa-times" onclick="removeFeature(${index})"></i>`;
        featuresList.appendChild(li);
      });
      hiddenFeatures.value = JSON.stringify(features);
    }

    window.removeFeature = function (index) {
      features.splice(index, 1);
      renderFeatures();
    };

    window.getCarModelDisplay = function (carId, fallbackModel) {
      if (
        typeof allCars !== "undefined" &&
        allCars &&
        allCars.length > 0 &&
        carId
      ) {
        const matchedCar = allCars.find(
          (c) => String(c["Car ID"] || "").trim() === String(carId).trim(),
        );
        if (matchedCar) {
          const parts = [];
          if (matchedCar["Car Name"]) parts.push(matchedCar["Car Name"]);
          if (matchedCar["Model"]) parts.push(matchedCar["Model"]);
          if (matchedCar["Year"]) parts.push(matchedCar["Year"]);
          if (parts.length > 0) {
            return parts.join(" ");
          }
        }
      }
      return fallbackModel || "-";
    };

    window.toggleExpenseAssociateNameInput = function () {
      const select = document.getElementById("expensePaidBy");
      const group = document.getElementById("expense-associate-name-group");
      const input = document.getElementById("expense-associate-name");
      if (select && group && input) {
        if (select.value === "Associate") {
          group.style.display = "block";
          input.required = true;
        } else {
          group.style.display = "none";
          input.required = false;
          input.value = "";
        }
      }
    };

    // =============================================
    // All Expenses Logic
    // =============================================
    window.initExpensesView = function () {
      // Set default expense date to today
      const today = new Date().toISOString().split("T")[0];
      const expenseDateInput = document.getElementById("expenseDate");
      if (expenseDateInput && !expenseDateInput.value) {
        expenseDateInput.value = today;
      }

      // Load cars if not loaded yet
      if (allCars.length === 0) {
        google.script.run
          .withSuccessHandler(function (vehicles) {
            allCars = vehicles;
            populateExpenseDropdowns();
            window.loadExpenses();
          })
          .getVehicles();
      } else {
        populateExpenseDropdowns();
        window.loadExpenses();
      }
    };

    function populateExpenseDropdowns() {
      const carIdSelect = document.getElementById("expenseCarId");
      const modelSelect = document.getElementById("expenseCarModel");

      carIdSelect.innerHTML = '<option value="">Select Stock #...</option>';
      modelSelect.innerHTML = '<option value="">Select Model...</option>';

      // Use Sets to keep unique values for model
      let uniqueModels = new Set();

      allCars.forEach((car) => {
        if (car["Car ID"]) {
          carIdSelect.innerHTML += `<option value="${car["Car ID"]}">${car["Car ID"]}</option>`;
        }
        if (car["Model"]) uniqueModels.add(car["Model"]);
      });

      uniqueModels.forEach((model) => {
        modelSelect.innerHTML += `<option value="${model}">${model}</option>`;
      });
    }

    window.syncExpenseDropdowns = function (changedField) {
      const carIdInput = document.getElementById("expenseCarId").value;
      const modelInput = document.getElementById("expenseCarModel").value;
      const clientInput = document.getElementById("expenseClientName").value;

      let matchedCar = null;

      if (changedField === "carId" && carIdInput) {
        matchedCar = allCars.find((c) => c["Car ID"] === carIdInput);
      } else if (changedField === "carModel" && modelInput) {
        matchedCar = allCars.find((c) => c["Model"] === modelInput);
      } else if (changedField === "clientName" && clientInput) {
        matchedCar = allCars.find((c) => c["CLIENT NAME"] === clientInput);
      }

      if (matchedCar) {
        if (changedField !== "carId" && matchedCar["Car ID"]) {
          document.getElementById("expenseCarId").value = matchedCar["Car ID"];
        }
        if (changedField !== "carModel" && matchedCar["Model"]) {
          document.getElementById("expenseCarModel").value =
            matchedCar["Model"];
        }
        if (changedField !== "clientName" && matchedCar["CLIENT NAME"]) {
          document.getElementById("expenseClientName").value =
            matchedCar["CLIENT NAME"];
        }
      }
    };

    window.handleExpenseSubmit = function (e) {
      e.preventDefault();

      const form = document.getElementById("addExpenseForm");
      const btn = document.getElementById("btnSubmitExpense");
      const originalText = btn.innerHTML;
      const isEditing = window.editingExpenseRow !== null;

      btn.innerHTML = isEditing
        ? '<i class="fas fa-spinner fa-spin"></i> Updating...'
        : '<i class="fas fa-spinner fa-spin"></i> Saving...';
      btn.disabled = true;

      const formData = new FormData(form);
      let paidByVal = formData.get("paidBy");
      if (paidByVal === "Associate") {
        const assocName = formData.get("expenseAssociateName")?.trim();
        if (assocName) {
          paidByVal = "Associate: " + assocName;
        }
      }

      const data = {
        carId: formData.get("carId"),
        carModel: formData.get("carModel"),
        clientName: formData.get("clientName"),
        description: formData.get("description"),
        paidBy: paidByVal,
        amount: formData.get("amount"),
        expenseDate: formData.get("expenseDate"),
      };

      if (isEditing) {
        google.script.run
          .withSuccessHandler(function (response) {
            showCreativeSuccessModal("Expense record updated successfully!");
            window.cancelExpenseEdit();
            btn.innerHTML = originalText;
            btn.disabled = false;
            window.loadExpenses();
          })
          .withFailureHandler(function (error) {
            alert("Error updating expense: " + error.message);
            btn.innerHTML = originalText;
            btn.disabled = false;
          })
          .updateExpense(window.editingExpenseRow, data);
      } else {
        google.script.run
          .withSuccessHandler(function (response) {
            showCreativeSuccessModal("Expense added successfully!");
            form.reset();
            window.toggleExpenseAssociateNameInput();
            // Keep today's date
            document.getElementById("expenseDate").value = new Date()
              .toISOString()
              .split("T")[0];

            btn.innerHTML = originalText;
            btn.disabled = false;

            // Reload expenses table
            window.loadExpenses();
          })
          .withFailureHandler(function (error) {
            alert("Error: " + error.message);
            btn.innerHTML = originalText;
            btn.disabled = false;
          })
          .saveExpense(data);
      }
    };

    let cachedExpenses = [];

    window.loadExpenses = function () {
      const tbody = document.getElementById("expensesTableBody");
      tbody.innerHTML =
        '<tr><td colspan="8" class="text-center" style="padding: 30px;"><i class="fas fa-spinner fa-spin" style="font-size: 24px; color: #3498db; margin-bottom: 10px; display: block;"></i> Loading expenses...</td></tr>';

      google.script.run
        .withSuccessHandler(function (expenses) {
          cachedExpenses = expenses || [];
          renderExpensesTable(cachedExpenses);
        })
        .withFailureHandler(function (error) {
          tbody.innerHTML =
            '<tr><td colspan="8" class="text-center text-danger" style="padding: 20px;">Error loading expenses: ' +
            error.message +
            "</td></tr>";
        })
        .getExpenses();
    };

    function renderExpensesTable(expensesToRender) {
      const tbody = document.getElementById("expensesTableBody");
      tbody.innerHTML = "";
      if (!expensesToRender || expensesToRender.length === 0) {
        tbody.innerHTML =
          '<tr><td colspan="8" class="text-center" style="padding: 20px; color: #7f8c8d;"><i class="fas fa-folder-open" style="font-size: 24px; display: block; margin-bottom: 10px; color: #bdc3c7;"></i> No expense records found.</td></tr>';
        return;
      }

      // We clone and reverse to show latest first
      [...expensesToRender].reverse().forEach((exp) => {
        const tr = document.createElement("tr");

        // Format amounts gracefully
        let amt = parseFloat(exp["AMOUNT"]);
        let formattedAmt = isNaN(amt) ? exp["AMOUNT"] : "$" + amt.toFixed(2);
        let badgeHtml = isNaN(amt)
          ? formattedAmt
          : `<span class="amount-badge">${formattedAmt}</span>`;

        // Format dates well
        let dateStr = formatDateToET(exp["EXPENSE DATE"]);

        let escClient = (
          exp["Client Name"] ||
          exp["CLIENT NAME"] ||
          ""
        ).replace(/'/g, "\\'");
        let escDesc = (exp["DESCRIPTION"] || "").replace(/'/g, "\\'");
        let escPaidBy = (exp["PAID BY"] || "").replace(/'/g, "\\'");
        let escModel = (exp["CAR MODEL"] || "").replace(/'/g, "\\'");
        let rawDate = exp["EXPENSE DATE"] || "";

        tr.innerHTML = `
          <td><strong>${window.getCarModelDisplay(exp["CAR ID"], exp["CAR MODEL"])}</strong></td>
          <td><span style="background: #e9ecef; padding: 5px 10px; border-radius: 6px; font-family: monospace; color: #4e73df; font-weight: 600; font-size: 0.85em;">${exp["CAR ID"] || "-"}</span></td>
          <td>${exp["Client Name"] || exp["CLIENT NAME"] || "-"}</td>
          <td>${exp["DESCRIPTION"] || "-"}</td>
          <td>${exp["PAID BY"] || "-"}</td>
          <td>${badgeHtml}</td>
          <td style="color: #858796;"><i class="far fa-calendar-alt" style="margin-right: 5px;"></i> ${dateStr || "-"}</td>
          <td>
            <div style="display: flex; gap: 8px;">
              <button class="btn-action edit" onclick="window.editExpenseRow(${exp.rowNumber}, '${exp["CAR ID"]}', '${escModel}', '${escClient}', '${rawDate}', '${escDesc}', '${escPaidBy}', '${exp["AMOUNT"] || 0}')" title="Edit" style="border: none; background: #eef2ff; color: #4f46e5; width: 30px; height: 30px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;"><i class="fas fa-edit"></i></button>
              <button class="btn-action delete" onclick="window.deleteExpenseRow(${exp.rowNumber})" title="Delete" style="border: none; background: #fef2f2; color: #ef4444; width: 30px; height: 30px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;"><i class="fas fa-trash-alt"></i></button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    window.filterExpenses = function () {
      const input = document.getElementById("expenseSearchInput");
      const term = input ? input.value.toLowerCase().trim() : "";

      if (!term) {
        renderExpensesTable(cachedExpenses);
      } else {
        const filtered = cachedExpenses.filter((exp) => {
          return Object.values(exp).some((val) =>
            String(val).toLowerCase().includes(term),
          );
        });
        renderExpensesTable(filtered);
      }
    };

    window.resetExpenses = function () {
      const input = document.getElementById("expenseSearchInput");
      if (input) input.value = "";
      renderExpensesTable(cachedExpenses);
    };

    // =============================================
    // WFM Business Expenses Logic
    // =============================================
    window.initWfmExpensesView = function () {
      // Set default date to today
      const today = new Date().toISOString().split("T")[0];
      const wfmDateInput = document.getElementById("wfm-date");
      if (wfmDateInput && !wfmDateInput.value) {
        wfmDateInput.value = today;
      }
      window.loadWfmExpenses();
    };

    window.toggleWfmAssociateNameInput = function () {
      const select = document.getElementById("wfm-paid-by");
      const group = document.getElementById("wfm-associate-name-group");
      const input = document.getElementById("wfm-associate-name");
      if (select && group && input) {
        if (select.value === "Associate") {
          group.style.display = "block";
          input.required = true;
        } else {
          group.style.display = "none";
          input.required = false;
          input.value = "";
        }
      }
    };

    window.calculateWfmTax = function () {
      const beforeTax = parseFloat(
        document.getElementById("wfm-value-before-tax").value,
      );
      const afterTaxInput = document.getElementById("wfm-value-after-tax");
      if (!isNaN(beforeTax)) {
        // Default: copy before-tax value to after-tax value if after-tax is empty
        if (!afterTaxInput.value) {
          afterTaxInput.value = beforeTax.toFixed(2);
        }
      }
    };

    window.editingWfmExpenseRow = null;

    window.handleWfmExpenseSubmit = function (e) {
      e.preventDefault();

      const form = document.getElementById("addWfmExpenseForm");
      const btn = document.getElementById("btnSubmitWfmExpense");
      const originalText = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
      btn.disabled = true;

      const formData = new FormData(form);
      let paidByVal = formData.get("wfmPaidBy");
      if (paidByVal === "Associate") {
        const assocName = formData.get("wfmAssociateName")?.trim();
        if (assocName) {
          paidByVal = "Associate: " + assocName;
        }
      }

      const data = {
        details: formData.get("wfmDetails"),
        valueBeforeTax: formData.get("wfmValueBeforeTax"),
        valueAfterTax: formData.get("wfmValueAfterTax"),
        date: formData.get("wfmDate"),
        paidBy: paidByVal,
      };

      const runServerCall = window.editingWfmExpenseRow
        ? google.script.run.withSuccessHandler(function (response) {
            showCreativeSuccessModal("Business Expense updated successfully!");
            window.cancelWfmExpenseEdit();
            btn.innerHTML = originalText;
            btn.disabled = false;
            window.loadWfmExpenses();
          })
        : google.script.run.withSuccessHandler(function (response) {
            showCreativeSuccessModal("Business Expense added successfully!");
            form.reset();
            window.toggleWfmAssociateNameInput();
            // Keep today's date
            document.getElementById("wfm-date").value = new Date()
              .toISOString()
              .split("T")[0];

            btn.innerHTML = originalText;
            btn.disabled = false;
            window.loadWfmExpenses();
          });

      runServerCall.withFailureHandler(function (error) {
        alert("Error: " + error.message);
        btn.innerHTML = originalText;
        btn.disabled = false;
      });

      if (window.editingWfmExpenseRow) {
        runServerCall.updateWfmExpense(window.editingWfmExpenseRow, data);
      } else {
        runServerCall.saveWfmExpense(data);
      }
    };

    let cachedWfmExpenses = [];

    window.loadWfmExpenses = function () {
      const tbody = document.getElementById("wfmExpensesTableBody");
      if (tbody) {
        tbody.innerHTML =
          '<tr><td colspan="6" class="text-center" style="padding: 30px;"><i class="fas fa-spinner fa-spin" style="font-size: 24px; color: #3498db; margin-bottom: 10px; display: block;"></i> Loading business expenses...</td></tr>';
      }

      google.script.run
        .withSuccessHandler(function (expenses) {
          cachedWfmExpenses = expenses || [];
          renderWfmExpensesTable(cachedWfmExpenses);
        })
        .withFailureHandler(function (error) {
          if (tbody) {
            tbody.innerHTML =
              '<tr><td colspan="6" class="text-center text-danger" style="padding: 20px;">Error loading business expenses: ' +
              error.message +
              "</td></tr>";
          }
        })
        .getWfmExpenses();
    };

    function renderWfmExpensesTable(expensesToRender) {
      const tbody = document.getElementById("wfmExpensesTableBody");
      if (!tbody) return;

      tbody.innerHTML = "";
      if (!expensesToRender || expensesToRender.length === 0) {
        tbody.innerHTML =
          '<tr><td colspan="6" class="text-center" style="padding: 20px; color: #7f8c8d;"><i class="fas fa-folder-open" style="font-size: 24px; display: block; margin-bottom: 10px; color: #bdc3c7;"></i> No business expense records found.</td></tr>';
        return;
      }

      // Clone and reverse to show latest first
      [...expensesToRender].reverse().forEach((exp) => {
        const tr = document.createElement("tr");

        let valBefore = parseFloat(exp["VALUE BEFORE TAX"]);
        let formattedBefore = isNaN(valBefore)
          ? exp["VALUE BEFORE TAX"]
          : "$" + valBefore.toFixed(2);

        let valAfter = parseFloat(exp["VALUE AFTER TAX"]);
        let formattedAfter = isNaN(valAfter)
          ? exp["VALUE AFTER TAX"]
          : "$" + valAfter.toFixed(2);
        let badgeHtml = isNaN(valAfter)
          ? formattedAfter
          : `<span class="amount-badge" style="background: #e0f2fe; color: #0369a1; font-weight: 700; padding: 6px 12px; border-radius: 8px; display: inline-block;">${formattedAfter}</span>`;

        let dateStr = formatDateToET(exp["DATE"]);

    window.parseYearsSold = function (yearsSoldStr) {
      const years = new Set();
      if (!yearsSoldStr) return [];
      const currentYear = new Date().getFullYear();

      // Split by comma or semicolon
      const parts = yearsSoldStr.split(/[,;]/);
      parts.forEach((part) => {
        const trimmed = part.trim();
        if (!trimmed) return;

        // Check for range like 2018-2024 or 2018–2024 or 2018-present
        const rangeMatch = trimmed.match(
          /^(\d{4})\s*[\-\u2013\u2014–—]\s*(\d{4}|present|current)?$/i,
        );
        if (rangeMatch) {
          const startYear = parseInt(rangeMatch[1]);
          let endYear = rangeMatch[2];
          if (
            !endYear ||
            endYear.toLowerCase() === "present" ||
            endYear.toLowerCase() === "current"
          ) {
            endYear = currentYear;
          } else {
            endYear = parseInt(endYear);
          }
          for (
            let y = Math.min(startYear, endYear);
            y <= Math.max(startYear, endYear);
            y++
          ) {
            years.add(y);
          }
        } else {
          // Just a single year
          const singleYear = parseInt(trimmed);
          if (!isNaN(singleYear) && singleYear >= 1900 && singleYear <= 2100) {
            years.add(singleYear);
          }
        }
      });
      return Array.from(years).sort((a, b) => b - a); // sort descending
    };

    window.initCascadingDropdowns = function (config) {
      const {
        makeSelect,
        modelSelect,
        trimSelect,
        yearSelect,
        fuelSelect,
        bodyStyleSelect,
        initialValues,
      } = config;

      if (!makeSelect) return;

      // Ensure reference records are loaded first
      window.loadCarReferenceRecords(function () {
        populateMakes();

        makeSelect.onchange = function () {
          onMakeChanged();
        };

        if (modelSelect) {
          modelSelect.onchange = function () {
            onModelChanged();
          };
        }

        if (initialValues) {
          setInitialValues();
        } else {
          updateDependentDropdowns();
        }
      });

      function populateMakes() {
        const selectedValue = makeSelect.value;
        const makes = new Set();
        window.carReferenceRecords.forEach((item) => {
          if (item.carName) makes.add(item.carName);
        });

        makeSelect.innerHTML = '<option value="">Select Make...</option>';
        Array.from(makes)
          .sort()
          .forEach((make) => {
            makeSelect.innerHTML += `<option value="${make}">${make}</option>`;
          });

        if (selectedValue && Array.from(makes).includes(selectedValue)) {
          makeSelect.value = selectedValue;
        }
      }

      function onMakeChanged() {
        if (modelSelect) modelSelect.value = "";
        if (trimSelect) trimSelect.value = "";
        if (yearSelect) yearSelect.value = "";
        if (fuelSelect) fuelSelect.value = "";
        if (bodyStyleSelect) bodyStyleSelect.value = "";

        updateDependentDropdowns();
      }

      function onModelChanged() {
        if (trimSelect) trimSelect.value = "";
        if (yearSelect) yearSelect.value = "";
        if (fuelSelect) fuelSelect.value = "";
        if (bodyStyleSelect) bodyStyleSelect.value = "";

        updateDependentDropdowns();
      }

      function updateDependentDropdowns() {
        const selectedMake = makeSelect.value;
        const selectedModel = modelSelect ? modelSelect.value : "";

        let filtered = window.carReferenceRecords;
        if (selectedMake) {
          filtered = filtered.filter((item) => item.carName === selectedMake);
        }

        if (modelSelect) {
          const currentVal = modelSelect.value;
          const models = new Set();
          modelSelect.innerHTML = selectedMake
            ? '<option value="">Select Model...</option>'
            : '<option value="">Select Make first...</option>';
          modelSelect.disabled = !selectedMake;

          if (selectedMake) {
            filtered.forEach((item) => {
              if (item.model) models.add(item.model);
            });
            Array.from(models)
              .sort()
              .forEach((model) => {
                modelSelect.innerHTML += `<option value="${model}">${model}</option>`;
              });
            if (currentVal && models.has(currentVal)) {
              modelSelect.value = currentVal;
            }
          }
        }

        let modelFiltered = filtered;
        if (selectedModel) {
          modelFiltered = modelFiltered.filter(
            (item) => item.model === selectedModel,
          );
        }

        if (trimSelect) {
          const currentVal = trimSelect.value;
          const trims = new Set();
          trimSelect.innerHTML = selectedMake
            ? '<option value="">Select Trim...</option>'
            : '<option value="">Select Make first...</option>';
          trimSelect.disabled = !selectedMake;

          if (selectedMake) {
            modelFiltered.forEach((item) => {
              if (item.trim) {
                const splitTrims = item.trim
                  .split("/")
                  .map((t) => t.trim())
                  .filter(Boolean);
                splitTrims.forEach((t) => trims.add(t));
              }
            });

    function getDirectImageUrl(url) {
      if (!url) return "";
      if (url.includes("drive.google.com/file/d/")) {
        const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if (match && match[1]) {
          // Use thumbnail endpoint for displaying Drive images in img tags
          return (
            "https://drive.google.com/thumbnail?id=" + match[1] + "&sz=w1000"
          );
        }
      }
      return url.trim();
    }

    function renderCars(vehicles) {
      const tbody = document.getElementById("carsTableBody");
      tbody.innerHTML = "";

      if (!vehicles || vehicles.length === 0) {
        tbody.innerHTML =
          '<tr><td colspan="8" class="text-center">No vehicles found.</td></tr>';
        return;
      }

      vehicles.reverse().forEach((car, index) => {
        const tr = document.createElement("tr");

        let firstMainImage = "";
        if (car["Main Image URLs"]) {
          let urls = car["Main Image URLs"].split(",");
          if (urls.length > 0 && urls[0].trim() !== "") {
            firstMainImage = getDirectImageUrl(urls[0].trim());
          }
        }

        const imgHtml = firstMainImage
          ? `<img src="${firstMainImage}" class="car-thumbnail">`
          : `<div class="car-thumbnail d-flex align-items-center justify-content-center"><i class="fas fa-car text-muted"></i></div>`;

        let statusClass = "status-available";
        let status = car["Status"] || "Available";
        if (status.toLowerCase().includes("sold")) statusClass = "status-sold";
        if (status.toLowerCase().includes("pending"))
          statusClass = "status-pending";

        let financingHtml = "";
        const finStatus = (car["Financing status"] || "")
          .toString()
          .trim()
          .toLowerCase();
        const isSold = (car["Status"] || "")
          .toString()
          .trim()
          .toLowerCase()
          .includes("sold");

        const dpRaw = car["DOWN PAYMENT"]
          ? car["DOWN PAYMENT"].toString().trim()
          : "";
        const dpNum = parseFloat(dpRaw.replace(/[^0-9.-]+/g, "")) || 0;

        const spRaw = car["SOLD PRICE"]
          ? car["SOLD PRICE"].toString().trim()
          : "";
        const spNum = parseFloat(spRaw.replace(/[^0-9.-]+/g, "")) || 0;

        // Force Active Loan if already sold, has a sold price, and down payment is 0
        const isForceActiveLoan = isSold && spNum > 0 && dpNum === 0;

        if (finStatus === "loan active" || isForceActiveLoan) {
          financingHtml = `<span style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); padding: 4px 8px; border-radius: 6px; font-weight: 600; font-size: 0.85em; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap;"><i class="fas fa-file-invoice-dollar"></i> Active Loan</span>`;
        } else if (finStatus === "paid off") {
          const isCash =
            (dpNum > 0 && Math.abs(dpNum - spNum) < 0.01) ||
            (dpNum === 0 && spNum === 0);

          if (isCash) {
            financingHtml = `<span style="background: rgba(46, 204, 113, 0.08); color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.15); padding: 4px 8px; border-radius: 6px; font-weight: 600; font-size: 0.85em; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap;"><i class="fas fa-money-bill-wave"></i> Cash</span>`;
          } else {
            financingHtml = `<span style="background: rgba(99, 102, 241, 0.1); color: #6366f1; border: 1px solid rgba(99, 102, 241, 0.2); padding: 4px 8px; border-radius: 6px; font-weight: 600; font-size: 0.85em; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap;"><i class="fas fa-hand-holding-usd"></i> Loan/Paid Off</span>`;
          }
        } else {
          financingHtml = `<span style="color: #858796; font-size: 0.85em;">-</span>`;
        }

        tr.innerHTML = `
          <td>${imgHtml}</td>
          <td class="stock-col"><strong>${car["Car ID"] || "-"}</strong></td>
          <td>
            <div style="color: black; font-weight: bold;">${car["Car Name"] || "-"} ${car["Year"] || ""}</div>
            <div style="color: gray; font-size: 0.9em;">${car["Model"] || "-"}</div>
          </td>
          <td>${car["CLIENT NAME"] || "-"}</td>
          <td>${car["Title"] || "-"}</td>
          <td>${financingHtml}</td>
          <td><span class="status-badge ${statusClass}">${status}</span></td>
          <td class="action-col">
            <button class="btn-view-action action-btn"><i class="fas fa-eye"></i> <span class="action-text">View</span></button>
            <button class="btn-edit-action action-btn"><i class="fas fa-edit"></i> <span class="action-text">Edit</span></button>
          </td>
        `;

        const btnView = tr.querySelector(".btn-view-action");
        const btnEdit = tr.querySelector(".btn-edit-action");

        btnView.onclick = (e) => {
          e.stopPropagation();
          openCarModal(car);
        };

        btnEdit.onclick = (e) => {
          e.stopPropagation();
          openCarModal(car);
          setEditMode(true);
        };

        tbody.appendChild(tr);
      });
    }

            inputHtml = `<input type="date" name="${key}" value="${val}" class="form-control">`;
          } else if (
            key === "Client Phone" ||
            key === "Driver Phone" ||
            key === "Dispatcher Phone number"
          ) {
            inputHtml = `<input type="tel" name="${key}" value="${val}" class="form-control" oninput="formatPhoneNumber(this)" placeholder="(123) 456-7890" maxlength="14" pattern="\\(\\d{3}\\) \\d{3}-\\d{4}" title="Please enter a valid phone number: (123) 456-7890">`;
          } else {
            inputHtml = `<input type="text" name="${key}" value="${val}" class="form-control">`;
          }

          let gridColumnStyle =
            key === "Interior Features" ||
            key === "NOTES" ||
            key === "DRIVER INFORMATION" ||
            key === "Comment" ||
            key === "Purchased Car Name"
              ? "grid-column: 1 / -1;"
              : "";

          itemsHtml += `
            <div class="input-group" style="${gridColumnStyle}">
               <label>${
                 key === "Status"
                   ? "Availabilities"
                   : key === "Car ID"
                     ? "Stock #"
                     : key === "Car Name"
                       ? "Make"
                       : key === "Price"
                         ? "Selling Price"
                         : key === "Dispatcher Phone number"
                           ? "Dispatcher Phone"
                           : key === "TRANSPORT FEES"
                             ? "Transport Fees"
                             : key === "Purchased Car Name"
                               ? ""
                               : key === "Trade In"
                                 ? "Cash down"
                                 : key === "Trade Value"
                                   ? "Trade/ Purchase Price"
                                   : key
               }</label>
               ${inputHtml}
            </div>
          `;
        }

        if (itemsHtml.trim() === "") return "";

        return `
          <div id="${title === "Trade" ? "editCategoryTrade" : ""}" class="spec-category" style="background:#fff; border-radius:15px; box-shadow:0 8px 25px rgba(0,0,0,0.05); padding:25px; margin-bottom: 30px; border-top: 5px solid var(--primary); width: 100%;">
            <h5 style="color: var(--primary); padding-bottom: 15px; border-bottom: 2px solid #eef4ff; margin-bottom: 20px; font-weight:700;"><i class="fas ${icon}" style="width: 25px;"></i> ${title}</h5>
            <div class="grid-responsive">
              ${itemsHtml}
            </div>
          </div>
        `;
      };

      categoriesDef.forEach((cat) => {
        // Render keys if they exist in car OR if they are our new calculated fields
        let keysToRender = cat.keys.filter(
          (k) =>
            k in currentEditableCar ||
            [
              "All Materials Expenses",
              "TOTAL COST",
              "LOAN AMOUNT",
              "REMAIN LOAN",
              "OVERPAYMENT",
              "PROFIT",
              "Trade Value",
              "Trade In",
              "Comment",
            ].includes(k),
        );
        categoriesHtml += renderCategory(cat.title, cat.icon, keysToRender);
      });

      grid.innerHTML = categoriesHtml;

      // Initialize dynamic cascading dropdowns for the edit form
      window.initCascadingDropdowns({
        makeSelect: document.getElementById("editCarNameSelect"),
        modelSelect: document.getElementById("editModelSelect"),
        trimSelect: document.getElementById("editTrimSelect"),
        yearSelect: document.getElementById("editYearSelect"),
        fuelSelect: document.getElementById("editFuelTypeSelect"),
        bodyStyleSelect: document.getElementById("editBodyStyleSelect"),
        initialValues: {
          make: currentEditableCar["Car Name"] || "",
          model: currentEditableCar["Model"] || "",
          trim: currentEditableCar["Trim"] || "",
          year: currentEditableCar["Year"] || "",
          fuel: currentEditableCar["Fuel Type"] || "",
          bodyStyle: currentEditableCar["Body Style"] || "",
        },
      });

      // Initialize dynamic tags for Interior Features edit field
      const editFeatureInput = document.getElementById("editFeatureInput");
      const editFeaturesList = document.getElementById("editFeaturesList");
      const editHiddenFeatures = document.getElementById("editHiddenFeatures");
      let editFeatures = [];

      if (editHiddenFeatures && editHiddenFeatures.value) {
        editFeatures = editHiddenFeatures.value
          .split(",")
          .map((f) => f.trim())
          .filter((f) => f !== "");
      }

      function renderEditFeatures() {
        if (!editFeaturesList) return;
        editFeaturesList.innerHTML = "";
        editFeatures.forEach((feat, index) => {
          const li = document.createElement("li");
          li.innerHTML = `${feat} <i class="fas fa-times" onclick="removeEditFeature(${index})"></i>`;
          editFeaturesList.appendChild(li);
        });
        if (editHiddenFeatures) {
          editHiddenFeatures.value = editFeatures.join(", ");
        }
      }

      window.removeEditFeature = function (index) {
        editFeatures.splice(index, 1);
        renderEditFeatures();
      };

      if (editFeatureInput) {
        editFeatureInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === ",") {
            e.preventDefault();
            const val = this.value.trim().replace(/,/g, "");
            if (val && !editFeatures.includes(val)) {
              editFeatures.push(val);
              renderEditFeatures();
            }
            this.value = "";
          }
        });

        editFeatureInput.addEventListener("input", function (e) {
          if (this.value.includes(",")) {
            const parts = this.value.split(",");
            parts.forEach((p) => {
              const val = p.trim();
              if (val && !editFeatures.includes(val)) {
                editFeatures.push(val);
              }
            });
            renderEditFeatures();
            this.value = "";
          }
        });
      }

      renderEditFeatures();

      // Sync duplicated fields (Dispatcher Price and TRANSPORT FEES)
      grid
        .querySelectorAll(
          'input[name="Dispatcher Price"], input[name="TRANSPORT FEES"]',
        )
        .forEach((input) => {
          input.addEventListener("input", (e) => {
            const name = e.target.getAttribute("name");
            const value = e.target.value;
            grid.querySelectorAll(`input[name="${name}"]`).forEach((dupe) => {
              if (dupe !== e.target) dupe.value = value;
            });
          });
        });

      // Show/Hide Trade section based on Trade status or Source Type
      const tradeStatusSelect = document.querySelector(
        'select[name="Trade status"]',
      );
      const sourceTypeSelect = document.querySelector(
        'select[name="Source Type"]',
      );
      const tradeSection = document.getElementById("editCategoryTrade");

      const updateTradeVisibility = () => {
        const isTradeStatus =
          tradeStatusSelect && tradeStatusSelect.value === "Trade";
        if (tradeSection) {
          tradeSection.style.display = isTradeStatus ? "block" : "none";
        }
      };

      if (tradeStatusSelect) {
        tradeStatusSelect.onchange = function () {
          updateTradeVisibility();
          updateEditSourceTypeVisibility();
        };
      }

      // Show/Hide fields based on Source Type and Trade status
      const updateEditSourceTypeVisibility = () => {
        if (!sourceTypeSelect) return;
        const sourceType = sourceTypeSelect.value;
        const tradeStatus = tradeStatusSelect ? tradeStatusSelect.value : "";

        // Define fields for each group
        const iaaiFields = [
          "IAAI Price Before Fees",
          "IAAI TOTAL PRICE W/ FEES",
        ];
        const privateFields = [
          "Seller Name",
          "Acquisition Date",
          "Purchase Price",
          "Private Notes",
        ];
        const tradeFields = [
          "Purchased Car Name",
          "Trade Value",
          "Trade In",
          "Comment",
        ];

        // Helper function to toggle fields
        const toggleFields = (fields, show) => {
          fields.forEach((field) => {
            const inputEls = document.querySelectorAll(
              `#carEditForm [name="${field}"]`,
            );
            inputEls.forEach((inputEl) => {
              const inputGroup = inputEl.closest(".input-group");
              if (inputGroup) {
                inputGroup.style.display = show ? "block" : "none";
              }
            });
          });
        };

        // Update visibility
        toggleFields(iaaiFields, sourceType === "IAAI");
        toggleFields(privateFields, sourceType === "Private/Partner");
        toggleFields(tradeFields, tradeStatus === "Trade");

        const linkDpContainer = document.getElementById("tradeLinkDpContainer");
        if (linkDpContainer) {
          linkDpContainer.style.display =
            tradeStatus === "Trade" ? "inline-flex" : "none";
        }

        // Also update the trade category section visibility
        updateTradeVisibility();
      };

      if (sourceTypeSelect) {
        sourceTypeSelect.onchange = updateEditSourceTypeVisibility;
        updateEditSourceTypeVisibility();
      }

      // Add live update listeners
      const form = document.getElementById("carEditForm");
      form.oninput = updateEditFormCalculations;

      const linkSwitch = document.getElementById("tradeLinkDpSwitch");
      if (linkSwitch) {
        linkSwitch.onchange = function () {
          var hiddenField = document.getElementById(
            "tradeUseAsDownPaymentHidden",
          );
          if (hiddenField) hiddenField.value = this.checked ? "true" : "false";
          updateEditFormCalculations();
        };
      }

      // Load available cars for Purchased Car Name dropdown
      var purchasedCarSelect = document.getElementById("editPurchasedCarName");
      if (purchasedCarSelect) {
        if (!purchasedCarSelect.hasChangeListener) {
          purchasedCarSelect.addEventListener(
            "change",
            updateEditFormCalculations,
          );
          purchasedCarSelect.hasChangeListener = true;
        }
        google.script.run
          .withSuccessHandler(function (cars) {
            var currentVal = currentEditableCar["Purchased Car Name"] || "";
            purchasedCarSelect.carsData = cars || [];
            purchasedCarSelect.currentVal = currentVal;
            purchasedCarSelect.currentTradeValue =
              currentEditableCar["Trade Value"] || 0;

            function renderOptions(filterQuery) {
              var query = (filterQuery || "").toLowerCase().trim();
              purchasedCarSelect.innerHTML =
                '<option value="">Select Available Vehicle...</option>';

              var filteredCars = (purchasedCarSelect.carsData || []).filter(
                function (car) {
                  var idMatch =
                    String(car.carId || "")
                      .toLowerCase()
                      .indexOf(query) !== -1;
                  var nameMatch =
                    String(car.carName || "")
                      .toLowerCase()
                      .indexOf(query) !== -1;
                  var modelMatch =
                    String(car.model || "")
                      .toLowerCase()
                      .indexOf(query) !== -1;
                  var yearMatch =
                    String(car.year || "")
                      .toLowerCase()
                      .indexOf(query) !== -1;
                  var displayMatch =
                    String(car.displayName || "")
                      .toLowerCase()
                      .indexOf(query) !== -1;
                  return (
                    idMatch ||
                    nameMatch ||
                    modelMatch ||
                    yearMatch ||
                    displayMatch
                  );
                },
              );

              filteredCars.forEach(function (car) {
                var option = document.createElement("option");
                option.value = car.carId;
                option.textContent = car.displayName;
                option.setAttribute(
                  "data-purchase-price",
                  car.purchasePrice || 0,
                );
                if (car.carId === purchasedCarSelect.currentVal)
                  option.selected = true;
                purchasedCarSelect.appendChild(option);
              });

              // Add current car's Purchased Car Name if it exists but not in available/filtered list
              if (
                purchasedCarSelect.currentVal &&
                !purchasedCarSelect.querySelector(
                  'option[value="' + purchasedCarSelect.currentVal + '"]',
                )
              ) {
                var displayVal = "#" + purchasedCarSelect.currentVal;
                var isMatched =
                  query === "" ||
                  String(purchasedCarSelect.currentVal)
                    .toLowerCase()
                    .indexOf(query) !== -1 ||
                  displayVal.toLowerCase().indexOf(query) !== -1;
                if (isMatched) {
                  var option = document.createElement("option");
                  option.value = purchasedCarSelect.currentVal;
                  option.textContent = displayVal;
                  option.setAttribute(
                    "data-purchase-price",
                    purchasedCarSelect.currentTradeValue || 0,
                  );
                  option.selected = true;
                  purchasedCarSelect.appendChild(option);
                }
              }
            }

            // Set up search bar event listener
            var searchInput = document.getElementById("editPurchasedCarSearch");
            if (searchInput) {
              searchInput.value = "";
              searchInput.oninput = function () {
                renderOptions(searchInput.value);
              };
            }

            renderOptions("");
            // Force calculations refresh to apply lock on load
            updateEditFormCalculations();
          })
          .getAvailableCarsForTrade(currentEditableCar["Car ID"] || "");
      }

      // Initial calculation and data fetch
      updateEditFormCalculations();

      // Fetch Materials Expenses for Edit Mode
      google.script.run
        .withSuccessHandler(function (total) {
          const field = form.querySelector('[name="All Materials Expenses"]');
          if (field) {
            field.value = (parseFloat(total) || 0).toFixed(2);
            updateEditFormCalculations(); // Recalculate after fetch
          }
        })
        .getTotalExpenseForCar(currentEditableCar["Car ID"]);

      // Fetch Total Payments for Remain Loan calculation
      google.script.run
        .withSuccessHandler(function (totalPayments) {
          form.setAttribute("data-total-payments", totalPayments || 0);
          updateEditFormCalculations(); // Recalculate after fetch
        })
        .getTotalPaymentForCar(currentEditableCar["Car ID"]);
    }

    function updateEditFormCalculations() {
      const form = document.getElementById("carEditForm");
      if (!form) return;

      const parseMoneyLocal = (val) => {
        if (!val) return 0;
        let p = parseFloat(String(val).replace(/[^0-9.-]+/g, ""));
        return isNaN(p) ? 0 : p;
      };

      const sourceType = form.querySelector('[name="Source Type"]')?.value;
      const isTrade = sourceType === "Trade";
      const linkSwitch = document.getElementById("tradeLinkDpSwitch");
      const isLinked = linkSwitch && linkSwitch.checked;

      // Check if a car is selected from "Search from Inventory" (Purchased Car Name)
      const purchasedCarSelect = form.querySelector(
        '[name="Purchased Car Name"]',
      );
      const isInventorySelected =
        purchasedCarSelect &&
        purchasedCarSelect.value &&
        purchasedCarSelect.value.trim() !== "";
      let inventoryPurchasePrice = 0;
      if (isInventorySelected && purchasedCarSelect.selectedIndex >= 0) {
        const selectedOpt =
          purchasedCarSelect.options[purchasedCarSelect.selectedIndex];
        if (selectedOpt) {
          inventoryPurchasePrice =
            parseFloat(selectedOpt.getAttribute("data-purchase-price")) || 0;
        }
      }

      // Disable/enable Data Input button dynamically
      const diBtn = document.getElementById("editPurchasedCarDataInputBtn");
      if (diBtn) {
        if (isInventorySelected) {
          diBtn.disabled = true;
          diBtn.style.opacity = "0.5";
          diBtn.style.cursor = "not-allowed";
          diBtn.style.backgroundColor = "#d1d3e2";
          diBtn.style.borderColor = "#d1d3e2";
          diBtn.style.color = "#858796";
        } else {
          diBtn.disabled = false;
          diBtn.style.opacity = "1";
          diBtn.style.cursor = "pointer";
          diBtn.style.backgroundColor = "#6c757d";
          diBtn.style.borderColor = "#6c757d";
          diBtn.style.color = "#ffffff";
        }
      }

      // Update Trade Value input value and read-only state
      const tradeValEls = form.querySelectorAll('[name="Trade Value"]');
      tradeValEls.forEach((tradeValEl) => {
        if (isInventorySelected) {
          tradeValEl.value = inventoryPurchasePrice.toFixed(2);
          tradeValEl.readOnly = true;
          tradeValEl.classList.add("readonly-locked");
          tradeValEl.title =
            "This value is locked to the Purchase Price of the selected inventory vehicle";
        } else {
          // If not selected from inventory, check if it's locked because it's linked as DP
          if (isLinked) {
            tradeValEl.readOnly = true;
            tradeValEl.classList.add("readonly-locked");
            tradeValEl.title =
              "This value is locked because it is applied as DOWN PAYMENT";
          } else {
            tradeValEl.readOnly = false;
            tradeValEl.classList.remove("readonly-locked");
            tradeValEl.title = "";
          }
        }
      });

      const tradeValue = parseMoneyLocal(
        form.querySelector('[name="Trade Value"]')?.value,
      );
      const tradeIn = parseMoneyLocal(
        form.querySelector('[name="Trade In"]')?.value,
      );

      // Handle Down Payment auto calculation when Use as Down Payment toggle is on
      const dpField = form.querySelector('[name="DOWN PAYMENT"]');
      if (dpField) {
        if (isLinked) {
          const calculatedDP = tradeValue + tradeIn;
          dpField.value = calculatedDP.toFixed(2);
          dpField.readOnly = true;
          dpField.classList.add("readonly-locked");
        } else {
          dpField.readOnly = false;
          dpField.classList.remove("readonly-locked");
        }
      }

      // Display Down Payment calculation helper dynamically
      const dpCalcEl = document.getElementById("editFormDownPaymentCalc");
      if (dpCalcEl) {
        const tradeStatus = form.querySelector('[name="Trade status"]')?.value;
        const isTradeMode = tradeStatus === "Trade" || sourceType === "Trade";
        if (isTradeMode) {
          dpCalcEl.style.display = "block";
          const calculatedDP = tradeValue + tradeIn;
          dpCalcEl.innerHTML = `<i class="fas fa-info-circle"></i> DOWN PAYMENT = Trade/ Purchase Price ($${tradeValue.toFixed(2)}) + Cash down ($${tradeIn.toFixed(2)}) = $${calculatedDP.toFixed(2)}`;
        } else {
          dpCalcEl.style.display = "none";
        }
      }

      const iaaiTotal = parseMoneyLocal(
        form.querySelector('[name="IAAI TOTAL PRICE W/ FEES"]')?.value,
      );
      const purchasePrice = parseMoneyLocal(
        form.querySelector('[name="Purchase Price"]')?.value,
      );
      const papePrice = parseMoneyLocal(
        form.querySelector('[name="PAPE PRICE"]')?.value,
      );
      const transportFees = parseMoneyLocal(
        form.querySelector('[name="TRANSPORT FEES"]')?.value,
      );
      const dispatcherPrice = parseMoneyLocal(
        form.querySelector('[name="Dispatcher Price"]')?.value,
      );
      const materialsExpenses = parseMoneyLocal(
        form.querySelector('[name="All Materials Expenses"]')?.value,
      );

      let basePrice = 0;
      if (sourceType === "IAAI") {
        basePrice = iaaiTotal;
      } else if (sourceType === "Private/Partner") {
        basePrice = purchasePrice;
      } else if (sourceType === "Trade") {
        basePrice = tradeValue;
      }

      const totalCost =
        basePrice +
        papePrice +
        transportFees +
        dispatcherPrice +
        materialsExpenses;
      const soldPrice = parseMoneyLocal(
        form.querySelector('[name="SOLD PRICE"]')?.value,
      );
      const downPayment = parseMoneyLocal(
        form.querySelector('[name="DOWN PAYMENT"]')?.value,
      );
      const totalPayments =
        parseFloat(form.getAttribute("data-total-payments")) || 0;

      const loanAmount =
        soldPrice > 0 && downPayment > 0 ? soldPrice - downPayment : 0;
      const remainLoan = loanAmount > 0 ? loanAmount - totalPayments : 0;
      const profit = soldPrice > 0 ? soldPrice - totalCost : 0;

      // Auto update Financing status based on loan and remain loan
      const fsField = form.querySelector('[name="Financing status"]');
      if (fsField && downPayment > 0) {
        if (remainLoan <= 0) {
          fsField.value = "Paid off";
          fsField.style.setProperty("color", "#0033A0", "important");
        } else {
          fsField.value = "Loan Active";
          fsField.style.setProperty("color", "#7F1D1D", "important");
        }
      }

      // Update fields
      const tcField = form.querySelector('[name="TOTAL COST"]');
      if (tcField) tcField.value = totalCost.toFixed(2);

      const sellingPrice = parseMoneyLocal(
        form.querySelector('[name="Price"]')?.value,
      );
      const discount =
        soldPrice > 0 ? Math.max(0, sellingPrice - soldPrice) : 0;
      const discField = form.querySelector('[name="Discount"]');
      if (discField) discField.value = discount.toFixed(2);

      const laField = form.querySelector('[name="LOAN AMOUNT"]');
      if (laField) laField.value = loanAmount.toFixed(2);

      const rlField = form.querySelector('[name="REMAIN LOAN"]');
      if (rlField)
        rlField.value =
          (remainLoan < 0 ? "-" : "") + Math.abs(remainLoan).toFixed(2);

      const overpayment = remainLoan < 0 ? Math.abs(remainLoan) : 0;
      const opField = form.querySelector('[name="OVERPAYMENT"]');
      if (opField) {
        opField.value = overpayment.toFixed(2);
        const opGroup = opField.closest(".input-group");
        if (opGroup) {
          if (overpayment > 0) {
            opGroup.style.display = "block";
            const newProfit = profit + overpayment;
            const formattedProfit =
              (profit >= 0 ? "" : "-") + "$" + Math.abs(profit).toFixed(2);
            const formattedNewProfit =
              (newProfit >= 0 ? "" : "-") +
              "$" +
              Math.abs(newProfit).toFixed(2);
            const calcLabel = document.getElementById("editFormNewProfitCalc");
            if (calcLabel) {
              calcLabel.innerHTML = `<span style="font-weight: 700; color: #047857;">New Profit = Profit (${formattedProfit}) + Overpayment ($${overpayment.toFixed(2)}) = ${formattedNewProfit}</span>`;
            }
          } else {
            opGroup.style.display = "none";
          }
        }
      }

      const pField = form.querySelector('[name="PROFIT"]');
      if (pField) {
        pField.value = (profit >= 0 ? "" : "-") + Math.abs(profit).toFixed(2);
        pField.style.setProperty(
          "color",
          profit >= 0 ? "#FF00FF" : "#e74a3b",
          "important",
        );
        pField.style.setProperty(
          "background-color",
          profit >= 0 ? "rgba(255, 0, 255, 0.1)" : "rgba(231, 74, 59, 0.08)",
          "important",
        );
        pField.style.setProperty(
          "border-color",
          profit >= 0 ? "#FF00FF" : "#e74a3b",
          "important",
        );
        const pIcon = pField.nextElementSibling;
        if (pIcon) {
          pIcon.style.setProperty(
            "color",
            profit >= 0 ? "#FF00FF" : "#e74a3b",
            "important",
          );
        }
      }
    }

    const carEditForm = document.getElementById("carEditForm");
    if (carEditForm) {
      // Auto-sync duplicate input fields (e.g., Trade Value, Trade In)
      const syncDuplicateFields = (e) => {
        if (e.target && e.target.name) {
          const name = e.target.name;
          const dups = carEditForm.querySelectorAll(`[name="${name}"]`);
          if (dups.length > 1) {
            dups.forEach((el) => {
              if (el !== e.target) {
                el.value = e.target.value;
              }
            });
            if (typeof window.recalculateEditFormFinancials === "function") {
              window.recalculateEditFormFinancials();
            }
          }
        }
      };
      carEditForm.addEventListener("input", syncDuplicateFields);
      carEditForm.addEventListener("change", syncDuplicateFields);

      carEditForm.onsubmit = async function (e) {
        e.preventDefault();
        const btn = carEditForm.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
        btn.disabled = true;

        const formDataObj = {};

        // Get standard text/select elements
        const elements = carEditForm.querySelectorAll(
          "input:not([type='file']), select, textarea",
        );
        elements.forEach((el) => {
          if (el.name) {
            formDataObj[el.name] = el.value;
          }
        });

        if (formDataObj["Interior Color"] === "Other(Name)") {
          formDataObj["Interior Color"] =
            formDataObj["Interior Color_custom"] || "";
        }
        if (formDataObj["Exterior Color"] === "Other(Name)") {
          formDataObj["Exterior Color"] =
            formDataObj["Exterior Color_custom"] || "";
        }
        if (formDataObj["Title"] === "Other") {
          formDataObj["Title"] = formDataObj["Title_custom"] || "";
        }
        delete formDataObj["Interior Color_custom"];
        delete formDataObj["Exterior Color_custom"];
        delete formDataObj["Title_custom"];

        // Add Car ID manually if needed (it might not be in the form fields)
        if (currentEditableCar && currentEditableCar["Car ID"]) {
          formDataObj["Car ID"] = currentEditableCar["Car ID"];
        }

        // Handle Main Image Update
        const mainImageBase64 = [];
        const mainImageInput = carEditForm.querySelector(
          'input[name="mainImageEdit"]',
        );
        if (mainImageInput && mainImageInput.files.length > 0) {
          for (let i = 0; i < mainImageInput.files.length; i++) {
            mainImageBase64.push(await fileToBase64(mainImageInput.files[i]));
          }
        }
        formDataObj.mainImages = mainImageBase64;

        // Handle Sub Images Update
        const subImagesBase64 = [];
        const subImagesInput = carEditForm.querySelector(
          'input[name="subImagesEdit"]',
        );
        if (subImagesInput && subImagesInput.files.length > 0) {
          for (let i = 0; i < subImagesInput.files.length; i++) {
            subImagesBase64.push(await fileToBase64(subImagesInput.files[i]));
          }
        }
        formDataObj.subImages = subImagesBase64;

        google.script.run
          .withSuccessHandler(function (response) {
            showCreativeSuccessModal("Details updated successfully!");
            btn.innerHTML = originalText;
            btn.disabled = false;

            // Update local object (note: images won't update locally until we get result from server or reload)
            // But we can merge the text fields
            const newTextData = {};
            elements.forEach((el) => {
              if (el.name) newTextData[el.name] = el.value;
            });

            if (newTextData["Interior Color"] === "Other(Name)") {
              newTextData["Interior Color"] =
                newTextData["Interior Color_custom"] || "";
            }
            if (newTextData["Exterior Color"] === "Other(Name)") {
              newTextData["Exterior Color"] =
                newTextData["Exterior Color_custom"] || "";
            }
            if (newTextData["Title"] === "Other") {
              newTextData["Title"] = newTextData["Title_custom"] || "";
            }
            delete newTextData["Interior Color_custom"];
            delete newTextData["Exterior Color_custom"];
            delete newTextData["Title_custom"];

            // For now, let's just reload the list or update text fields
            Object.assign(currentEditableCar, newTextData);

            // Re-render the details in view mode
            // If images were changed, they won't show the new ones immediately because we don't have the URLs yet

            google.script.run
              .withSuccessHandler(function (updatedCarList) {
                // Find the updated car in the list
                const refreshedCar = updatedCarList.find(
                  (c) => c["Car ID"] === currentEditableCar["Car ID"],
                );
                if (refreshedCar) {
                  currentEditableCar = refreshedCar;
                  openCarModal(currentEditableCar);
                }
                setEditMode(false);
              })
              .getVehicles();
          })
          .withFailureHandler(function (error) {

            btn.disabled = false;

          .updateVehicleData(formDataObj);

          if (expensesList && expensesList.length > 0) {
            expensesList.forEach(function (exp) {

      // Define calculation helper for overpayment and new profit details
      window.updateDetailsOverpaymentAndNewProfit = function () {
        const remainEl = document.getElementById("pageCarRemainLoan");
        const profitEl = document.getElementById("pageCarProfit");
        const overpaymentCard = document.getElementById(
          "pageCarOverpaymentCard",
        );
        const overpaymentValue = document.getElementById(
          "pageCarOverpaymentValue",
        );
        const newProfitLabel = document.getElementById("pageCarNewProfitLabel");

        if (!remainEl || !overpaymentCard) return;

        const remain = parseFloat(remainEl.getAttribute("data-remain-loan"));
        if (isNaN(remain)) return; // not loaded yet

        if (remain < 0) {
          const overpayment = Math.abs(remain);
          overpaymentCard.style.display = "flex";
          if (overpaymentValue) {
            overpaymentValue.innerHTML = `$${overpayment.toFixed(2)}`;
          }

          // If profit is loaded, calculate new profit
          if (profitEl && newProfitLabel) {
            const baseProfit = parseFloat(
              profitEl.getAttribute("data-base-profit"),
            );
            if (!isNaN(baseProfit)) {
              const newProfit = baseProfit + overpayment;
              const formattedBaseProfit =

                "$" +
                Math.abs(baseProfit).toFixed(2);
              const formattedNewProfit =

    window.initPaymentView = function () {
      // Set default payment date to today
      const today = new Date().toISOString().split("T")[0];
      const paymentDateInput = document.getElementById("pay-date");
      if (paymentDateInput && !paymentDateInput.value) {
        paymentDateInput.value = today;
      }

      // Load cars if not loaded yet
      if (allCars.length === 0) {
        google.script.run
          .withSuccessHandler(function (vehicles) {
            allCars = vehicles;
            populatePaymentDropdowns();
            window.loadPayments();
          })
          .getVehicles();
      } else {
        populatePaymentDropdowns();
        window.loadPayments();
      }

      // Bind event listeners for Payment view
      const refreshBtn = document.getElementById("refresh-payments");
      if (refreshBtn) {
        // Remove existing listener to avoid duplicates
        const newRefreshBtn = refreshBtn.cloneNode(true);
        refreshBtn.parentNode.replaceChild(newRefreshBtn, refreshBtn);
        newRefreshBtn.addEventListener("click", window.loadPayments);
      }

      const paymentForm = document.getElementById("add-payment-form");
      if (paymentForm) {
        // Remove any existing event listeners by cloning
        const newPaymentForm = paymentForm.cloneNode(true);
        paymentForm.parentNode.replaceChild(newPaymentForm, paymentForm);
        newPaymentForm.addEventListener("submit", submitPayment);
        newPaymentForm.addEventListener("reset", () => {
          setTimeout(() => {
            const today = new Date().toISOString().split("T")[0];
            const payDateInput = document.getElementById("pay-date");
            if (payDateInput) payDateInput.value = today;
          }, 0);
        });
      }

      // Sync dropdowns
      const carIdSelect = document.getElementById("pay-car-id");
      const modelSelect = document.getElementById("pay-car-model");
      const clientInput = document.getElementById("pay-client-name");

      if (carIdSelect) {
        // use event delegation or replace nodes since clones don't keep listeners
        const newCarIdSelect = carIdSelect.cloneNode(true);
        carIdSelect.parentNode.replaceChild(newCarIdSelect, carIdSelect);
        newCarIdSelect.addEventListener("change", () =>
          syncPaymentDropdowns("carId"),
        );
      }
      if (modelSelect) {
        const newModelSelect = modelSelect.cloneNode(true);
        modelSelect.parentNode.replaceChild(newModelSelect, modelSelect);
        newModelSelect.addEventListener("change", () =>
          syncPaymentDropdowns("carModel"),
        );
      }
      if (clientInput) {
        const newClientInput = clientInput.cloneNode(true);
        clientInput.parentNode.replaceChild(newClientInput, clientInput);
        newClientInput.addEventListener("input", () =>
          syncPaymentDropdowns("clientName"),
        );
      }
    };

    function populatePaymentDropdowns() {
      const carIdSelect = document.getElementById("pay-car-id");
      const modelSelect = document.getElementById("pay-car-model");

      if (!carIdSelect || !modelSelect) return;

      carIdSelect.innerHTML = '<option value="">Select Stock #...</option>';
      modelSelect.innerHTML = '<option value="">Select Model...</option>';

      if (!allCars) return;

      // Use Sets to keep unique values for model
      let uniqueModels = new Set();

      allCars.forEach((car) => {
        if (car["Car ID"]) {
          carIdSelect.innerHTML += `<option value="${car["Car ID"]}">${car["Car ID"]}</option>`;
        }
        if (car["Model"]) uniqueModels.add(car["Model"]);
      });

      Array.from(uniqueModels)
        .sort()
        .forEach((model) => {
          modelSelect.innerHTML += `<option value="${model}">${model}</option>`;
        });
    }

    function syncPaymentDropdowns(changedField) {
      const carIdSelect = document.getElementById("pay-car-id");
      const modelSelect = document.getElementById("pay-car-model");
      const clientInput = document.getElementById("pay-client-name");

      if (!allCars || !carIdSelect || !modelSelect || !clientInput) return;

      let matchedCar = null;

      if (changedField === "carId" && carIdSelect.value) {
        matchedCar = allCars.find((c) => c["Car ID"] === carIdSelect.value);
      } else if (changedField === "carModel" && modelSelect.value) {
        matchedCar = allCars.find((c) => c["Model"] === modelSelect.value);
      } else if (changedField === "clientName" && clientInput.value) {
        matchedCar = allCars.find(
          (c) => c["CLIENT NAME"] === clientInput.value,
        );
      }

      if (matchedCar) {
        if (changedField !== "carId" && matchedCar["Car ID"]) {
          carIdSelect.value = matchedCar["Car ID"];
        }
        if (changedField !== "carModel" && matchedCar["Model"]) {
          modelSelect.value = matchedCar["Model"];
        }
        if (changedField !== "clientName" && matchedCar["CLIENT NAME"]) {
          clientInput.value = matchedCar["CLIENT NAME"];
        }
      }
    }

    function submitPayment(e) {
      e.preventDefault();
      const form = e.target;
      const btn =
        document.getElementById("btnSubmitPayment") ||
        form.querySelector('button[type="submit"]');
      const originalText = btn.innerHTML;
      const isEditing = window.editingPaymentRow !== null;

      btn.innerHTML = isEditing
        ? '<span class="btn-text">Updating...</span> <i class="fas fa-spinner fa-spin"></i>'
        : '<span class="btn-text">Submitting...</span> <i class="fas fa-spinner fa-spin"></i>';
      btn.disabled = true;

      const formData = new FormData(form);
      const data = {
        carId: formData.get("payCarId"),
        carModel: formData.get("payCarModel"),
        clientName: formData.get("payClientName"),
        paymentOption: formData.get("payOption"),
        amount: formData.get("payAmount"),
        paymentDate: formData.get("payDate"),
        notes: formData.get("payNotes"),
      };

      if (isEditing) {
        google.script.run
          .withSuccessHandler(function (response) {
            showCreativeSuccessModal("Payment record updated successfully!");
            window.cancelPaymentEdit();
            btn.innerHTML = originalText;
            btn.disabled = false;
            window.loadPayments();
          })
          .withFailureHandler(function (error) {
            alert("Error updating payment: " + error.message);
            btn.innerHTML = originalText;
            btn.disabled = false;
          })
          .updatePayment(window.editingPaymentRow, data);
      } else {
        google.script.run
          .withSuccessHandler(function (response) {
            showCreativeSuccessModal("Payment added successfully!");
            form.reset();
            // Keep today's date
            document.getElementById("pay-date").value = new Date()
              .toISOString()
              .split("T")[0];

            btn.innerHTML = originalText;
            btn.disabled = false;

            // Reload payments table
            window.loadPayments();
          })
          .withFailureHandler(function (error) {
            alert("Error: " + error.message);
            btn.innerHTML = originalText;
            btn.disabled = false;
          })
          .savePayment(data);
      }
    }
