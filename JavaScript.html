<script>
  document.addEventListener("DOMContentLoaded", function () {
    // Navigation logic
    const allNavLinks = document.querySelectorAll(
      ".nav-link[data-view], .submenu a[data-view]",
    );
    const topBarTitle = document.querySelector(".topbar h2");
    const viewDashboard = document.getElementById("view-dashboard");
    const viewPlaceholder = document.getElementById("view-placeholder");
    const placeholderTitle = document.getElementById("placeholder-title");

    allNavLinks.forEach((link) => {
      link.addEventListener("click", function (e) {
        // Only prevent default if it's not a submenu parent
        if (
          !this.classList.contains("nav-link") ||
          !this.parentElement.classList.contains("has-submenu")
        ) {
          e.preventDefault();

          // Remove active class from all links
          document
            .querySelectorAll(".nav-menu a")
            .forEach((a) => a.classList.remove("active"));
          document
            .querySelectorAll(".nav-item")
            .forEach((li) => li.classList.remove("active"));

          // Add active class to clicked link
          this.classList.add("active");
          if (this.closest(".submenu")) {
            this.closest(".has-submenu").classList.add("active");
          } else {
            this.parentElement.classList.add("active");
          }

          // Handle view switching
          const targetView = this.getAttribute("data-view");
          let viewTitle = this.textContent.trim();

          // Prefix parent title if in submenu
          if (this.closest(".submenu")) {
            const parentTitle = this.closest(".has-submenu")
              .querySelector(".nav-text")
              .textContent.trim();
            viewTitle = parentTitle + " / " + viewTitle;
          }

          topBarTitle.textContent = viewTitle;

          // Hide all views
          document
            .querySelectorAll(".view")
            .forEach((v) => v.classList.remove("active"));

          const specificView = document.getElementById("view-" + targetView);

          if (specificView) {
            specificView.classList.add("active");

            // If View All Cars is opened, load the data
            if (targetView === "buy-view-all") {
              loadCars();
            }
          } else {
            viewPlaceholder.classList.add("active");
            placeholderTitle.textContent = viewTitle + " Content Goes Here";

            // Generate some creative CTA based on the section
            let ctaAction = "Process";
            if (targetView.includes("add")) ctaAction = "Add Car";
            if (targetView.includes("view")) ctaAction = "Refresh List";
            if (targetView.includes("booking")) ctaAction = "New Booking";

            // Re-render placeholder content
            viewPlaceholder.innerHTML = `
              <h1>${viewTitle}</h1>
              <p style="margin-top: 15px; color: #555;">This section is currently under construction. Here you will manage ${viewTitle.toLowerCase()}.</p>
              <div style="margin-top: 30px;">
                 <button class="btn-primary" onclick="alert('${ctaAction} initiated!')">
                   <i class="fas fa-location-arrow"></i> ${ctaAction}
                 </button>
              </div>
            `;
          }
        }
      });
    });

    // Populate Year Dropdown (1990 - 2050)
    const yearSelect = document.getElementById("yearSelect");
    if (yearSelect) {
      for (let y = 1990; y <= 2050; y++) {
        let opt = document.createElement("option");
        opt.value = y;
        opt.textContent = y;
        yearSelect.appendChild(opt);
      }
    }

    // Handles the Interior Features tags input
    const featureInput = document.getElementById("featureInput");
    const featuresList = document.getElementById("featuresList");
    const hiddenFeatures = document.getElementById("hiddenFeatures");
    let features = [];

    if (featureInput) {
      featureInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === "," || e.key === " ") {
          e.preventDefault();
          const val = this.value.trim().replace(/,/g, "");
          if (val && !features.includes(val)) {
            features.push(val);
            renderFeatures();
          }
          this.value = "";
        }
      });
    }

    function renderFeatures() {
      featuresList.innerHTML = "";
      features.forEach((feat, index) => {
        const li = document.createElement("li");
        li.innerHTML = `${feat} <i class="fas fa-times" onclick="removeFeature(${index})"></i>`;
        featuresList.appendChild(li);
      });
      hiddenFeatures.value = JSON.stringify(features);
    }

    window.removeFeature = function (index) {
      features.splice(index, 1);
      renderFeatures();
    };

    // File input UX changes
    document.querySelectorAll(".file-input").forEach((input) => {
      input.addEventListener("change", function (e) {
        const wrapper = this.closest(".file-upload-wrapper");
        const textElement = wrapper.querySelector("p");
        if (this.files && this.files.length > 1) {
          textElement.textContent = `${this.files.length} files selected`;
          wrapper.style.borderColor = "var(--primary)";
        } else if (this.files && this.files.length === 1) {
          textElement.textContent = this.files[0].name;
          wrapper.style.borderColor = "var(--primary)";
        } else {
          textElement.textContent = wrapper.classList.contains("main-img")
            ? "Drag or Click to Upload"
            : "Select Multiple Images";
          wrapper.style.borderColor = "";
        }
      });
    });

    // View Cars Logic
    let allCars = [];

    function getDirectImageUrl(url) {
      if (!url) return "";
      if (url.includes("drive.google.com/file/d/")) {
        const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if (match && match[1]) {
          // Use thumbnail endpoint for displaying Drive images in img tags
          return (
            "https://drive.google.com/thumbnail?id=" + match[1] + "&sz=w1000"
          );
        }
      }
      return url.trim();
    }

    function loadCars() {
      const tbody = document.getElementById("carsTableBody");
      tbody.innerHTML =
        '<tr><td colspan="6" class="text-center"><i class="fas fa-spinner fa-spin"></i> Loading vehicles...</td></tr>';

      google.script.run
        .withSuccessHandler(function (vehicles) {
          allCars = vehicles;
          renderCars(vehicles);
        })
        .withFailureHandler(function (error) {
          tbody.innerHTML =
            '<tr><td colspan="6" class="text-center text-danger">Error loading vehicles: ' +
            error.message +
            "</td></tr>";
        })
        .getVehicles();
    }

    function renderCars(vehicles) {
      const tbody = document.getElementById("carsTableBody");
      tbody.innerHTML = "";

      if (!vehicles || vehicles.length === 0) {
        tbody.innerHTML =
          '<tr><td colspan="6" class="text-center">No vehicles found.</td></tr>';
        return;
      }

      vehicles.reverse().forEach((car, index) => {
        const tr = document.createElement("tr");
        tr.onclick = () => openCarModal(car);

        let firstMainImage = "";
        if (car["Main Image URLs"]) {
          let urls = car["Main Image URLs"].split(",");
          if (urls.length > 0 && urls[0].trim() !== "") {
            firstMainImage = getDirectImageUrl(urls[0].trim());
          }
        }

        const imgHtml = firstMainImage
          ? `<img src="${firstMainImage}" class="car-thumbnail">`
          : `<div class="car-thumbnail d-flex align-items-center justify-content-center"><i class="fas fa-car text-muted"></i></div>`;

        let statusClass = "status-available";
        let status = car["Status"] || "Available";
        if (status.toLowerCase().includes("sold")) statusClass = "status-sold";
        if (status.toLowerCase().includes("pending"))
          statusClass = "status-pending";

        tr.innerHTML = `
          <td>${imgHtml}</td>
          <td><strong>${car["Car ID"] || "-"}</strong></td>
          <td>${car["Car Name"] || "-"}</td>
          <td>${car["Model"] || "-"} (${car["Year"] || "-"})</td>
          <td class="text-success fw-bold">$${car["Price"] || "0"}</td>
          <td><span class="status-badge ${statusClass}">${status}</span></td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Car Details Page View Logic
    const viewCarDetails = document.getElementById("view-car-details");
    const btnBackToCars = document.getElementById("btnBackToCars");
    let currentEditableCar = null;

    if (btnBackToCars) {
      btnBackToCars.onclick = function () {
        document
          .querySelectorAll(".view")
          .forEach((v) => v.classList.remove("active"));
        document.getElementById("view-buy-view-all").classList.add("active");

        // Restore title to "View All Cars"
        const topBarTitle = document.querySelector(".topbar h2");
        if (topBarTitle) topBarTitle.textContent = "Buy / View All Cars";

        // Reset Edit mode if active
        setEditMode(false);
      };
    }

    function setEditMode(isEdit) {
      const viewMode = document.getElementById("pageCarViewMode");
      const editMode = document.getElementById("pageCarEditMode");
      const editBtn = document.getElementById("btnEditCarDetails");

      if (isEdit) {
        viewMode.style.display = "none";
        editMode.style.display = "block";
        editBtn.style.display = "none"; // Hide edit button while editing
        populateEditForm();
      } else {
        viewMode.style.display = "block";
        editMode.style.display = "none";
        editBtn.style.display = "flex";
      }
    }

    const btnEditCarDetails = document.getElementById("btnEditCarDetails");
    if (btnEditCarDetails) {
      btnEditCarDetails.onclick = () => setEditMode(true);
    }

    const btnCancelEdit = document.getElementById("btnCancelEdit");
    if (btnCancelEdit) {
      btnCancelEdit.onclick = () => setEditMode(false);
    }

    function populateEditForm() {
      if (!currentEditableCar) return;
      const grid = document.getElementById("editFormFieldsGrid");
      grid.innerHTML = "";

      const skippedKeys = ["Timestamp", "Main Image URLs", "Sub Image URLs"];

      const dropdownOptions = {
        Status: ["Available", "Sold", "Pending"],
        Title: ["Clean", "Rebuilt", "Lien", "Salvage"],
        "Style of Car": ["4 Door", "2 Door"],
        "Body Style": ["Sedan", "SUV", "Sport", "Hatchback", "N/a"],
        "Rent or Sell": ["Sell", "Rent", "Both"],
        Engine: ["Non sport", "Sport"],
        "Engine Type/Size": ["2.5L 4 cylinder", "V6", "V8", "hybrid"],
        Transmission: ["Automatic", "Manual", "CVT(continuously variable)"],
        Driveline: ["FWD", "RWD", "AWD", "4WD"],
        "Fuel Type": ["Gasoline", "Diesel", "Hybrid", "Electric"],
        "Power Options": ["Keyless", "Remote", "Key entry"],
        "Drive Condition": ["Runs/drives", "Run, stationed", "n/a"],
        Condition: ["New", "Pre-owned", "Used", "Salvage"],
        "Seat Material": ["Leather", "Clothes"],
        "Interior Color": [
          "Black",
          "White",
          "Gray",
          "Beige",
          "Brown",
          "Tan",
          "Ivory/Cream",
          "Charcoal",
          "Multi-color",
          "Other(Name)",
        ],
        "Exterior Color": [
          "White",
          "Black",
          "Silver",
          "Gray",
          "Beige",
          "Blue",
          "Red",
          "Green",
          "Brown",
          "Yellow",
          "Gold",
          "Multi-color",
          "Other(Name)",
        ],
      };

      for (const key in currentEditableCar) {
        if (skippedKeys.includes(key)) continue;

        let val = currentEditableCar[key] || "";
        let inputHtml = "";

        if (key === "Car ID") {
          inputHtml = `<input type="text" name="${key}" value="${val}" class="form-control" readonly style="background:#e9ecef; cursor:not-allowed;">`;
        } else if (key === "Description" || key === "Interior Features") {
          inputHtml = `<textarea name="${key}" class="form-control" rows="3">${val}</textarea>`;
        } else if (key === "Year") {
          let options = '<option value="">Select Year...</option>';
          for (let y = 1990; y <= 2050; y++) {
            options += `<option value="${y}" ${val == y ? "selected" : ""}>${y}</option>`;
          }
          inputHtml = `<select name="${key}" class="form-control" required>${options}</select>`;
        } else if (dropdownOptions[key]) {
          let options = `<option value="">Select ${key}...</option>`;
          dropdownOptions[key].forEach((opt) => {
            options += `<option value="${opt}" ${val === opt ? "selected" : ""}>${opt}</option>`;
          });
          inputHtml = `<select name="${key}" class="form-control">${options}</select>`;
        } else if (key === "Price" || key === "Discount") {
          // Changed to text input instead of number to allow for clean updates, but keeping it flexible.
          // Since some data already has formats like $20,000 we'll use text or strip characters if user enters.
          inputHtml = `<input type="text" name="${key}" value="${val}" class="form-control" required>`;
        } else if (key === "PURCHASE DATE" || key === "SOLD DATE") {
          // Format date string if it includes time component to yyyy-mm-dd for input display
          if (val) {
            try {
              let d = new Date(val);
              if (!isNaN(d.getTime())) val = d.toISOString().split("T")[0];
            } catch (e) {}
          }
          inputHtml = `<input type="date" name="${key}" value="${val}" class="form-control">`;
        } else {
          inputHtml = `<input type="text" name="${key}" value="${val}" class="form-control">`;
        }

        grid.innerHTML += `
            <div class="input-group">
               <label>${key}</label>
               ${inputHtml}
            </div>
          `;
      }
    }

    const carEditForm = document.getElementById("carEditForm");
    if (carEditForm) {
      carEditForm.onsubmit = function (e) {
        e.preventDefault();
        const btn = carEditForm.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
        btn.disabled = true;

        const formData = new FormData(carEditForm);
        const updatedData = {};
        formData.forEach((value, key) => {
          updatedData[key] = value;
        });

        google.script.run
          .withSuccessHandler(function (response) {
            alert("Details updated successfully!");
            btn.innerHTML = originalText;
            btn.disabled = false;

            // Update locally so we don't have to fully reload immediately
            Object.assign(currentEditableCar, updatedData);

            // Re-render the details in view mode
            openCarModal(currentEditableCar);
            setEditMode(false);

            // Optionally refresh the whole list in background
            // loadCars();
          })
          .withFailureHandler(function (error) {
            alert("Error saving: " + error.message);
            btn.innerHTML = originalText;
            btn.disabled = false;
          })
          .updateVehicleData(updatedData);
      };
    }

    function openCarModal(car) {
      currentEditableCar = car;
      setEditMode(false);

      // Hide all views and show the details view
      document
        .querySelectorAll(".view")
        .forEach((v) => v.classList.remove("active"));
      viewCarDetails.classList.add("active");

      // Update Topbar Title
      const topBarTitle = document.querySelector(".topbar h2");
      if (topBarTitle) topBarTitle.textContent = "Car Details";

      // Set Header and Subtitle
      document.getElementById("pageCarTitle").innerHTML =
        `<i class="fas fa-car title-icon"></i> ${car["Car Name"] || "Car Details"}`;
      document.getElementById("pageCarSubtitle").textContent =
        `ID: ${car["Car ID"] || "N/A"}`;

      // Images
      const mainImageContainer = document.getElementById(
        "pageMainImageContainer",
      );
      const subImagesContainer = document.getElementById(
        "pageSubImagesContainer",
      );

      mainImageContainer.innerHTML = "";
      subImagesContainer.innerHTML = "";

      let allImages = [];
      if (car["Main Image URLs"]) {
        allImages = allImages.concat(
          car["Main Image URLs"]
            .split(",")
            .map((u) => getDirectImageUrl(u.trim()))
            .filter((u) => u !== ""),
        );
      }
      if (car["Sub Image URLs"]) {
        allImages = allImages.concat(
          car["Sub Image URLs"]
            .split(",")
            .map((u) => getDirectImageUrl(u.trim()))
            .filter((u) => u !== ""),
        );
      }

      if (allImages.length > 0) {
        mainImageContainer.innerHTML = `<img src="${allImages[0]}" id="pageMainImgDisplay">`;

        allImages.forEach((url, i) => {
          const thumb = document.createElement("img");
          thumb.src = url;
          if (i === 0) thumb.classList.add("active-thumb");

          thumb.onclick = function () {
            document.getElementById("pageMainImgDisplay").src = this.src;
            document
              .querySelectorAll(".image-strip img")
              .forEach((img) => img.classList.remove("active-thumb"));
            this.classList.add("active-thumb");
          };

          subImagesContainer.appendChild(thumb);
        });
      } else {
        mainImageContainer.innerHTML = `<div style="height:400px; display:flex; align-items:center; justify-content:center; background:#f8f9fc; border-radius:10px;"><i class="fas fa-car fa-5x text-muted"></i></div>`;
      }

      // Price & Status Card
      document.getElementById("pageCarPrice").textContent =
        `$${car["Price"] || "0"}`;
      document.getElementById("pageCarStatus").textContent =
        car["Status"] || "Available";

      // Details Info Grid
      const infoContainer = document.getElementById("pageCarInfo");
      infoContainer.innerHTML = "";

      const createSpecItem = (label, value, icon, color) => {
        if (!value || value.toString().trim() === "") return "";
        return `
          <div class="spec-item" style="border-left-color: ${color || "var(--primary)"}">
            <div class="spec-label"><i class="fas ${icon || "fa-check"}"></i> ${label}</div>
            <div class="spec-value">${value}</div>
          </div>
        `;
      };

      const discountEl = document.getElementById("pageCarDiscount");
      if (
        car["Discount"] &&
        car["Discount"] !== "0" &&
        car["Discount"].toString().trim() !== ""
      ) {
        discountEl.innerHTML = `<i class="fas fa-tags"></i> Discount: ${car["Discount"]}`;
        discountEl.style.display = "inline-block";
      } else {
        discountEl.style.display = "none";
      }

      let infoHtml = "";
      infoHtml += createSpecItem(
        "Title",
        car["Title"],
        "fa-file-signature",
        "#f6c23e",
      );
      infoHtml += createSpecItem(
        "Rent or Sell",
        car["Rent or Sell"],
        "fa-hand-holding-usd",
        "#1cc88a",
      );
      infoHtml += createSpecItem("VIN", car["VIN"], "fa-barcode", "#4e73df");
      infoHtml += createSpecItem(
        "Model & Year",
        `${car["Model"] || ""} ${car["Year"] || ""}`,
        "fa-calendar-alt",
        "#36b9cc",
      );
      infoHtml += createSpecItem(
        "Mileage",
        car["Mileage"],
        "fa-tachometer-alt",
        "#e74a3b",
      );
      infoHtml += createSpecItem(
        "Style / Body",
        `${car["Style of Car"] || ""} ${car["Body Style"] ? "/ " + car["Body Style"] : ""}`,
        "fa-car",
        "#f6c23e",
      );
      infoHtml += createSpecItem(
        "Engine",
        `${car["Engine"] || ""} ${car["Engine Type/Size"] ? "(" + car["Engine Type/Size"] + ")" : ""}`,
        "fa-cogs",
        "#1cc88a",
      );
      infoHtml += createSpecItem(
        "Transmission",
        car["Transmission"],
        "fa-cog",
        "#4e73df",
      );
      infoHtml += createSpecItem(
        "Driveline",
        car["Driveline"],
        "fa-road",
        "#36b9cc",
      );
      infoHtml += createSpecItem(
        "Fuel Type",
        car["Fuel Type"],
        "fa-gas-pump",
        "#e74a3b",
      );
      infoHtml += createSpecItem(
        "Power Options",
        car["Power Options"],
        "fa-bolt",
        "#f6c23e",
      );
      infoHtml += createSpecItem(
        "Condition / Drive",
        `${car["Condition"] || ""} ${car["Drive Condition"] ? "/ " + car["Drive Condition"] : ""}`,
        "fa-clipboard-check",
        "#1cc88a",
      );
      infoHtml += createSpecItem(
        "Colors (Ext / Int)",
        `${car["Exterior Color"] || ""} ${car["Interior Color"] ? "/ " + car["Interior Color"] : ""}`,
        "fa-palette",
        "#4e73df",
      );
      infoHtml += createSpecItem(
        "Seat Material",
        car["Seat Material"],
        "fa-chair",
        "#36b9cc",
      );
      infoHtml += createSpecItem(
        "Features",
        car["Interior Features"],
        "fa-star",
        "#e74a3b",
      );
      infoHtml += createSpecItem(
        "Client Name",
        car["CLIENT NAME"],
        "fa-user",
        "#4e73df",
      );
      infoHtml += createSpecItem(
        "Purchase Date",
        car["PURCHASE DATE"],
        "fa-calendar-plus",
        "#1cc88a",
      );
      infoHtml += createSpecItem(
        "Sold Date",
        car["SOLD DATE"],
        "fa-calendar-check",
        "#f6c23e",
      );

      infoContainer.innerHTML = infoHtml;

      // Description Card
      const descCard = document.getElementById("pageCarDescCard");
      if (car["Description"] && car["Description"].trim() !== "") {
        document.getElementById("pageCarDescription").innerHTML = String(
          car["Description"],
        ).replace(/\n/g, "<br>");
        descCard.style.display = "block";
      } else {
        descCard.style.display = "none";
      }
    }

    // Search Logic
    const searchInput = document.getElementById("carSearchInput");
    const btnSearch = document.getElementById("btnSearchCars");
    const btnReset = document.getElementById("btnResetSearch");

    if (btnSearch) {
      btnSearch.addEventListener("click", function () {
        const query = searchInput.value.toLowerCase();
        if (!query) {
          renderCars(allCars);
          return;
        }

        const filtered = allCars.filter((car) => {
          return (
            (car["Car ID"] && car["Car ID"].toLowerCase().includes(query)) ||
            (car["Car Name"] &&
              car["Car Name"].toLowerCase().includes(query)) ||
            (car["Model"] && car["Model"].toLowerCase().includes(query)) ||
            (car["Year"] &&
              car["Year"].toString().toLowerCase().includes(query)) ||
            (car["Status"] && car["Status"].toLowerCase().includes(query))
          );
        });

        renderCars(filtered);
      });
    }

    if (btnReset) {
      btnReset.addEventListener("click", function () {
        searchInput.value = "";
        renderCars(allCars);
      });
    }

    if (searchInput) {
      searchInput.addEventListener("keyup", function (e) {
        if (e.key === "Enter") {
          btnSearch.click();
        }
      });
    }
  });

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () =>
        resolve({
          name: file.name,
          mimeType: file.type,
          data: reader.result.split(",")[1],
        });
      reader.onerror = (error) => reject(error);
      reader.readAsDataURL(file);
    });
  }

  // Handle Form Submission
  async function handleCarSubmit(e) {
    e.preventDefault();
    const btn = e.target.querySelector(".btn-save-creative");
    // UX loading state
    const originalText = btn.innerHTML;
    btn.innerHTML =
      '<i class="fas fa-spinner fa-spin"></i> Saving to Google Sheet...';
    btn.disabled = true;

    try {
      const form = e.target;
      const formDataObj = {};

      // Get standard text/select elements
      const elements = form.querySelectorAll(
        'input:not([type="file"]), select, textarea',
      );
      elements.forEach((el) => {
        if (el.name) {
          formDataObj[el.name] = el.value;
        }
      });

      // Handle Main Image
      const mainImageBase64 = [];
      const mainImageInput = form.querySelector('input[name="mainImage"]');
      if (mainImageInput && mainImageInput.files.length > 0) {
        for (let i = 0; i < mainImageInput.files.length; i++) {
          mainImageBase64.push(await fileToBase64(mainImageInput.files[i]));
        }
      }
      formDataObj.mainImages = mainImageBase64;

      // Handle Sub Images
      const subImagesBase64 = [];
      const subImagesInput = form.querySelector('input[name="subImages"]');
      if (subImagesInput && subImagesInput.files.length > 0) {
        for (let i = 0; i < subImagesInput.files.length; i++) {
          subImagesBase64.push(await fileToBase64(subImagesInput.files[i]));
        }
      }
      formDataObj.subImages = subImagesBase64;

      // Process Array structure logic if needed:
      let interiorFeatures = formDataObj.interiorFeatures
        ? JSON.parse(formDataObj.interiorFeatures)
        : [];
      formDataObj.interiorFeaturesStr = interiorFeatures.join(", ");

      google.script.run
        .withSuccessHandler(function (response) {
          alert("Car Details Saved Successfully!");
          e.target.reset();
          if (window.removeFeature) {
            document.getElementById("featuresList").innerHTML = "";
            document.getElementById("hiddenFeatures").value = "[]";
            // We simulate emptying the internal array since it's shadowed, by reloading the view or relying on users not reusing session.
          }
          document.querySelectorAll(".file-upload-wrapper p").forEach((p) => {
            if (
              p.closest(".input-group").querySelector('input[name="mainImage"]')
            ) {
              p.textContent = "Drag or Click to Upload";
            } else {
              p.textContent = "Select Multiple Images";
            }
          });
          document
            .querySelectorAll(".file-upload-wrapper")
            .forEach((w) => (w.style.borderColor = ""));

          btn.innerHTML = originalText;
          btn.disabled = false;
        })
        .withFailureHandler(function (error) {
          alert("Error: " + error.message);
          btn.innerHTML = originalText;
          btn.disabled = false;
        })
        .saveNewVehicle(formDataObj);
    } catch (error) {
      alert("Error processing form files: " + error);
      btn.innerHTML = originalText;
      btn.disabled = false;
    }
  }
</script>
