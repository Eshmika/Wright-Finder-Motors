    window.renderCommunicationTable = function () {
      const tbody = document.getElementById("commTableBody");
      const searchInput = document.getElementById("commSearchInput");
      if (!tbody) return;

      const query = searchInput ? searchInput.value.toLowerCase().trim() : "";

      tbody.innerHTML = "";

      // Filter active loan vehicles
      const loanVehicles = allCars.filter((car) => {
        const dp = (car["DOWN PAYMENT"] || "").toString().trim();
        const hasDownPayment =
          dp !== "" &&
          dp !== "0" &&
          dp !== "0.00" &&
          dp !== "$0.00" &&
          dp !== "$0" &&
          parseFloat(dp.replace(/[^0-9.-]+/g, "")) > 0;
        const hasClient = (car["CLIENT NAME"] || "").toString().trim() !== "";
        return hasDownPayment && hasClient;
      });

      const filtered = loanVehicles.filter((car) => {
        if (!query) return true;
        const stockId = (car["Car ID"] || "").toLowerCase();
        const name = (car["Car Name"] || "").toLowerCase();
        const model = (car["Model"] || "").toLowerCase();
        const client = (car["CLIENT NAME"] || "").toLowerCase();
        const email = (car["Client Email"] || "").toLowerCase();
        return (
          stockId.includes(query) ||
          name.includes(query) ||
          model.includes(query) ||
          client.includes(query) ||
          email.includes(query)
        );
      });

      const totalRecords = filtered.length;
      const totalPages = Math.ceil(totalRecords / commRowsPerPage) || 1;

      if (commCurrentPage > totalPages) commCurrentPage = totalPages;
      if (commCurrentPage < 1) commCurrentPage = 1;

      const startIndex = (commCurrentPage - 1) * commRowsPerPage;
      const endIndex = Math.min(startIndex + commRowsPerPage, totalRecords);

      const pageSlice = filtered.slice(startIndex, endIndex);

      // Update pagination DOM
      const infoEl = document.getElementById("commPaginationInfo");
      if (infoEl) {
        infoEl.innerText = `Showing ${totalRecords === 0 ? 0 : startIndex + 1} to ${endIndex} of ${totalRecords} entries`;
      }

      const prevBtn = document.getElementById("commPrevBtn");
      const nextBtn = document.getElementById("commNextBtn");
      if (prevBtn) {
        prevBtn.disabled = commCurrentPage === 1;
        prevBtn.style.opacity = commCurrentPage === 1 ? "0.5" : "1";
        prevBtn.style.cursor =
          commCurrentPage === 1 ? "not-allowed" : "pointer";
      }
      if (nextBtn) {
        nextBtn.disabled = commCurrentPage === totalPages;
        nextBtn.style.opacity = commCurrentPage === totalPages ? "0.5" : "1";
        nextBtn.style.cursor =
          commCurrentPage === totalPages ? "not-allowed" : "pointer";
      }

      const pageNumbersContainer = document.getElementById("commPageNumbers");
      if (pageNumbersContainer) {
        pageNumbersContainer.innerHTML = "";
        for (let i = 1; i <= totalPages; i++) {
          const btn = document.createElement("button");
          btn.innerText = i;
          btn.className = "action-btn";
          if (i === commCurrentPage) {
            btn.style.cssText =
              "padding: 6px 12px; border-radius: 4px; font-size: 0.85rem; background: #512b81; color: white; border: none; font-weight: bold; cursor: default;";
          } else {
            btn.style.cssText =
              "padding: 6px 12px; border-radius: 4px; font-size: 0.85rem; background: #eaecf4; color: #858796; border: none; cursor: pointer; transition: all 0.2s;";
            btn.onclick = () => {
              commCurrentPage = i;
              window.renderCommunicationTable();
            };
          }
          pageNumbersContainer.appendChild(btn);
        }
      }

      if (pageSlice.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="7" class="text-center" style="padding: 20px; color: #858796;">
              No matching loan vehicles found.
            </td>
          </tr>`;
      } else {
        pageSlice.forEach((car) => {
          const email = (car["Client Email"] || "").toString().trim();
          const hasEmail =
            email !== "" && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

          const btnDisabled = !hasEmail ? "disabled" : "";
          const btnStyle = !hasEmail
            ? "background: #eaecf4; color: #a6a8b6; border: none; cursor: not-allowed; opacity: 0.7;"
            : "background: #512b81; color: white; border: none; cursor: pointer; box-shadow: 0 4px 6px rgba(81, 43, 129, 0.2);";

          const tr = document.createElement("tr");
          tr.id = "comm-row-" + car["Car ID"];

          const status = (car["Agreement Status"] || "").toString().trim();

          let dateStr = "";
          if (car["Installment End Date"]) {
            try {
              const d = new Date(car["Installment End Date"]);
              if (!isNaN(d.getTime())) {
                const yyyy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, "0");
                const dd = String(d.getDate()).padStart(2, "0");
                dateStr = `${yyyy}-${mm}-${dd}`;
              }
            } catch (e) {}
          }

          let statusHtml = "";
          if (status === "Signed") {
            statusHtml = `<span style="background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); padding: 5px 12px; border-radius: 20px; font-weight: 700; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 5px;"><i class="fas fa-check-circle"></i> Signed</span>`;
          } else if (status === "Pending") {
            statusHtml = `<span style="background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.2); padding: 5px 12px; border-radius: 20px; font-weight: 700; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 5px;"><i class="fas fa-clock"></i> Pending</span>`;
          } else {
            statusHtml = `<span style="background: rgba(100, 116, 139, 0.1); color: #64748b; border: 1px solid rgba(100, 116, 139, 0.2); padding: 5px 12px; border-radius: 20px; font-weight: 700; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 5px;"><i class="fas fa-question-circle"></i> Not Sent</span>`;
          }

          const btnText =
            status === "Signed" || status === "Pending"
              ? "Resend Email"
              : "Send Email";
          const btnIcon =
            status === "Signed" || status === "Pending"
              ? "fa-redo"
              : "fa-paper-plane";

          const pdfLink = car["Agreement PDF Link"] || "";
          let pdfHtml = "";
          if (pdfLink) {
            pdfHtml = `
              <a
                href="${pdfLink}"
                target="_blank"
                class="action-btn"
                style="padding: 8px 16px; border-radius: 6px; font-size: 0.9rem; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; background: #10b981; color: white; border: none; cursor: pointer; text-decoration: none; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);"
              >
                <i class="fas fa-file-pdf"></i> View
              </a>`;
          } else {
            pdfHtml = `<span style="color: #64748b; font-style: italic; font-size: 0.85rem;">No PDF</span>`;
          }

          tr.innerHTML = `
            <td class="stock-col"><strong>${car["Car ID"] || "-"}</strong></td>
            <td>
              <div style="color: black; font-weight: bold;">${car["Car Name"] || "-"} ${car["Year"] || ""}</div>
              <div style="color: gray; font-size: 0.9em;">${car["Model"] || "-"}</div>
            </td>
            <td><strong>${car["CLIENT NAME"] || "-"}</strong></td>
            <td>${email ? email : '<span style="color: #e74a3b; font-style: italic;"><i class="fas fa-exclamation-triangle"></i> Not Set</span>'}</td>
            <td style="text-align: center;">${statusHtml}</td>
            <td style="text-align: center;">${pdfHtml}</td>
            <td style="text-align: center;" class="action-col">
              ${
                status === "Signed"
                  ? ""
                  : `
              <div style="display: flex; gap: 8px; justify-content: center; align-items: center;">
                <button
                  class="action-btn"
                  style="padding: 8px 12px; border-radius: 6px; font-size: 0.9rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s; background: #4e73df; color: white; border: none; cursor: pointer; box-shadow: 0 4px 6px rgba(78, 115, 223, 0.2);"
                  onclick="openInstallmentModal('${car["Car ID"]}', '${(car["Installment Frequency"] || "").toString().replace(/'/g, "\\'")}', '${dateStr}')"
                  title="Edit Installment Terms"
                >
                  <i class="fas fa-edit"></i> Edit Terms
                </button>
                <button
                  class="action-btn"
                  style="padding: 8px 12px; border-radius: 6px; font-size: 0.9rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s; ${btnStyle}"
                  ${btnDisabled}
                  onclick="sendAgreementEmail('${car["Car ID"]}')"
                >
                  <i class="fas ${btnIcon}"></i> ${btnText}
                </button>
              </div>
              `
              }
            </td>
          `;
          tbody.appendChild(tr);
        });
      }
    };

          .withSuccessHandler(function (result) {

              document.getElementById("docReqForm").reset();
              showCreativeSuccessModal(result.message);
              window.loadDocReqTable();
            } else {
              alert("Error: " + (result ? result.message : "Unknown error"));
            }
          })
          .withFailureHandler(function (error) {
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalHtml;
            alert("Failed to send request: " + error.message);
          })
          .sendClientDocumentRequestEmail(
            email,
            subject,
            message,
            encodedFiles,
            carId,
          );
      };

      if (fileInput && fileInput.files.length > 0) {
        const promises = Array.from(fileInput.files).map((file) => {
          return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
              const base64Data = e.target.result.split(",")[1];
              resolve({
                name: file.name,
                mimeType: file.type,
                data: base64Data,
              });
            };
            reader.onerror = () => reject(new Error("File read error"));
            reader.readAsDataURL(file);
          });
        });

        Promise.all(promises)
          .then((filesData) => sendRequest(filesData))
          .catch((err) => {
            alert("Error reading attachment files: " + err.message);
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalHtml;
          });
      } else {
        sendRequest([]);
      }
    };

              <i class="fas fa-spinner fa-spin fa-2x" style="color: #512b81;"></i>

      google.script.run
        .withSuccessHandler(function (requests) {
          allDocRequests = requests || [];

          allDocRequests.sort(
            (a, b) => new Date(b.timestamp) - new Date(a.timestamp),
          );
          window.renderDocReqTable();
        })
        .withFailureHandler(function (error) {
          if (tbody) {
            tbody.innerHTML = `
              <tr>
                <td colspan="6" class="text-center" style="padding: 20px; color: #e74a3b;">

    window.renderDocReqTable = function () {
      const tbody = document.getElementById("docReqTableBody");
      const searchInput = document.getElementById("docReqSearchInput");
      if (!tbody) return;

      const query = searchInput ? searchInput.value.toLowerCase().trim() : "";
      tbody.innerHTML = "";

      const filtered = allDocRequests.filter((req) => {
        if (!query) return true;
        const email = (req.clientEmail || "").toLowerCase();
        const subject = (req.subject || "").toLowerCase();
        const carId = (req.carId || "").toLowerCase();
        const status = (req.status || "").toLowerCase();
        return (
          email.includes(query) ||
          subject.includes(query) ||
          carId.includes(query) ||
          status.includes(query)
        );
      });

      const totalRecords = filtered.length;
      const totalPages = Math.ceil(totalRecords / docReqRowsPerPage) || 1;

      if (docReqCurrentPage > totalPages) docReqCurrentPage = totalPages;
      if (docReqCurrentPage < 1) docReqCurrentPage = 1;

      const startIndex = (docReqCurrentPage - 1) * docReqRowsPerPage;
      const endIndex = Math.min(startIndex + docReqRowsPerPage, totalRecords);

      const pageSlice = filtered.slice(startIndex, endIndex);

      // Update Pagination DOM
      const startEl = document.getElementById("docReqPageStart");
      const endEl = document.getElementById("docReqPageEnd");
      const totalEl = document.getElementById("docReqTotalRecords");
      if (startEl) startEl.innerText = totalRecords === 0 ? 0 : startIndex + 1;
      if (endEl) endEl.innerText = endIndex;
      if (totalEl) totalEl.innerText = totalRecords;

      const prevBtn = document.getElementById("docReqPrevBtn");
      const nextBtn = document.getElementById("docReqNextBtn");
      if (prevBtn) {
        prevBtn.disabled = docReqCurrentPage === 1;
        prevBtn.style.opacity = docReqCurrentPage === 1 ? "0.5" : "1";
      }
      if (nextBtn) {
        nextBtn.disabled = docReqCurrentPage === totalPages;
        nextBtn.style.opacity = docReqCurrentPage === totalPages ? "0.5" : "1";
      }

      const pageNumbersContainer = document.getElementById("docReqPageNumbers");
      if (pageNumbersContainer) {
        pageNumbersContainer.innerHTML = "";
        for (let i = 1; i <= totalPages; i++) {
          const btn = document.createElement("button");
          btn.innerText = i;
          btn.className = "action-btn";
          if (i === docReqCurrentPage) {
            btn.style.cssText =
              "padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; background: #512b81; color: white; border: none; font-weight: bold; cursor: default;";
          } else {
            btn.style.cssText =
              "padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; background: #eaecf4; color: #858796; border: none; cursor: pointer; transition: all 0.2s;";
            btn.onclick = () => {
              docReqCurrentPage = i;
              window.renderDocReqTable();
            };
          }
          pageNumbersContainer.appendChild(btn);
        }
      }

      if (pageSlice.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6" class="text-center" style="padding: 20px; color: #858796;">
              No matching document requests found.
            </td>
          </tr>`;
      } else {
        pageSlice.forEach((req) => {
          // Format Timestamp
          let dateStr = "N/A";
          if (req.timestamp) {
            try {
              const d = new Date(req.timestamp);
              dateStr =
                d.toLocaleDateString("en-US", {
                  month: "short",
                  day: "numeric",
                  year: "numeric",
                  timeZone: "America/New_York",
                }) +
                " " +
                d.toLocaleTimeString("en-US", {
                  hour: "2-digit",
                  minute: "2-digit",
                  timeZone: "America/New_York",
                });
            } catch (e) {}
          }

          // Format status badge
          let statusHtml = "";
          if (req.status === "Uploaded") {
            statusHtml = `<span style="background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); padding: 3px 8px; border-radius: 12px; font-weight: 700; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 4px;"><i class="fas fa-check-circle"></i> Uploaded</span>`;
          } else {
            statusHtml = `<span style="background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.2); padding: 3px 8px; border-radius: 12px; font-weight: 700; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 4px;"><i class="fas fa-clock"></i> Pending</span>`;
          }

          // Sender reference files
          let senderFilesHtml = "";
          if (req.senderAttachments) {
            const lines = req.senderAttachments.split("\n");
            lines.forEach((line) => {
              if (line) {
                const parts = line.split(" -> ");
                const name = parts[0] || "File";
                const url = parts[1] || line;
                senderFilesHtml += `<a href="${url}" target="_blank" style="display: block; font-size: 0.8rem; color: #512b81; text-decoration: none; margin-bottom: 4px; font-weight: 600;"><i class="fas fa-paperclip"></i> ${name}</a>`;
              }
            });
          }
          if (!senderFilesHtml)
            senderFilesHtml =
              '<span style="color: gray; font-style: italic; font-size: 0.8rem;">None</span>';

          // Client uploaded files
          let clientFilesHtml = "";
          if (req.uploadedDocuments) {
            const lines = req.uploadedDocuments.split("\n");
            lines.forEach((line) => {
              if (line) {
                const parts = line.split(" -> ");
                const name = parts[0] || "File";
                const url = parts[1] || line;
                clientFilesHtml += `<a href="${url}" target="_blank" style="display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; background: #ece8f6; border-radius: 6px; font-size: 0.8rem; color: #512b81; text-decoration: none; font-weight: 600; margin-right: 5px; margin-bottom: 5px; border: 1px solid #dcd3ef; transition: all 0.2s;"><i class="fas fa-file-download"></i> ${name}</a>`;
              }
            });
          }
          if (!clientFilesHtml)
            clientFilesHtml =
              '<span style="color: gray; font-style: italic; font-size: 0.85rem;">Waiting for client...</span>';

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${dateStr}</td>
            <td>
              <div style="font-weight: bold; color: black;">${req.clientEmail}</div>
              <div style="font-size: 0.8rem; color: gray;">Car Stock ID: ${req.carId}</div>
            </td>
            <td><strong>${req.subject}</strong></td>
            <td>${senderFilesHtml}</td>
            <td style="text-align: center;">${statusHtml}</td>
            <td style="text-align: center;">${clientFilesHtml}</td>
          `;
          tbody.appendChild(tr);
        });
      }
    };

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () =>
        resolve({
          name: file.name,
          mimeType: file.type,
          data: reader.result.split(",")[1],
        });
      reader.onerror = (error) => reject(error);
      reader.readAsDataURL(file);
    });
  }

  // Handle Form Submission
  async function handleCarSubmit(e) {
    e.preventDefault();
    const btn = e.target.querySelector(".btn-save-creative");
    // UX loading state
    const originalText = btn.innerHTML;
    btn.innerHTML =
      '<i class="fas fa-spinner fa-spin"></i> Saving to Google Sheet...';
    btn.disabled = true;

    try {
      const form = e.target;
      const formDataObj = {};

      // Get standard text/select elements
      const elements = form.querySelectorAll(
        'input:not([type="file"]), select, textarea',
      );
      elements.forEach((el) => {
        if (el.name) {
          formDataObj[el.name] = el.value;
        }
      });

      if (formDataObj.interiorColor === "Other(Name)") {
        const customField = document.getElementById("addInteriorColorCustom");
        if (customField) formDataObj.interiorColor = customField.value;
      }
      if (formDataObj.exteriorColor === "Other(Name)") {
        const customField = document.getElementById("addExteriorColorCustom");
        if (customField) formDataObj.exteriorColor = customField.value;
      }
      if (formDataObj.title === "Other") {
        const customField = document.getElementById("addTitleCustom");
        if (customField) formDataObj.title = customField.value;
      }

      // Handle Main Image
      const mainImageBase64 = [];
      const mainImageInput = form.querySelector('input[name="mainImage"]');
      if (mainImageInput && mainImageInput.files.length > 0) {
        for (let i = 0; i < mainImageInput.files.length; i++) {
          mainImageBase64.push(await fileToBase64(mainImageInput.files[i]));
        }
      }
      formDataObj.mainImages = mainImageBase64;

      // Handle Sub Images
      const subImagesBase64 = [];
      const subImagesInput = form.querySelector('input[name="subImages"]');
      if (subImagesInput && subImagesInput.files.length > 0) {
        for (let i = 0; i < subImagesInput.files.length; i++) {
          subImagesBase64.push(await fileToBase64(subImagesInput.files[i]));
        }
      }
      formDataObj.subImages = subImagesBase64;

      // Process Array structure logic if needed:
      let interiorFeatures = formDataObj.interiorFeatures
        ? JSON.parse(formDataObj.interiorFeatures)
        : [];
      formDataObj.interiorFeaturesStr = interiorFeatures.join(", ");

      google.script.run
        .withSuccessHandler(function (response) {
          showCreativeSuccessModal("Car Details Saved Successfully!");
          e.target.reset();
          const addTitleCustom = document.getElementById("addTitleCustom");
          if (addTitleCustom) {
            addTitleCustom.style.display = "none";
            addTitleCustom.required = false;
          }
          if (window.removeFeature) {
            document.getElementById("featuresList").innerHTML = "";
            document.getElementById("hiddenFeatures").value = "[]";
            // We simulate emptying the internal array since it's shadowed, by reloading the view or relying on users not reusing session.
          }
          document.querySelectorAll(".file-upload-wrapper p").forEach((p) => {
            if (
              p.closest(".input-group").querySelector('input[name="mainImage"]')
            ) {
              p.textContent = "Drag or Click to Upload";
            } else {
              p.textContent = "Select Multiple Images";
            }
          });
          document
            .querySelectorAll(".file-upload-wrapper")
            .forEach((w) => (w.style.borderColor = ""));

          btn.innerHTML = originalText;
          btn.disabled = false;
        })
        .withFailureHandler(function (error) {
          alert("Error: " + error.message);
          btn.innerHTML = originalText;
          btn.disabled = false;
        })
        .saveNewVehicle(formDataObj);
    } catch (error) {
      alert("Error processing form files: " + error);
      btn.innerHTML = originalText;
      btn.disabled = false;
    }
  }

  window.initCustomMultiselect = function (selectElement) {
    if (!selectElement || selectElement.dataset.multiselectInitialized) return;
    selectElement.dataset.multiselectInitialized = "true";

    // Hide original select visually
    selectElement.classList.add("visually-hidden-select");

    // Wrap in container
    const container = document.createElement("div");
    container.className = "multiselect-container";
    selectElement.parentNode.insertBefore(container, selectElement);
    container.appendChild(selectElement);

    // Create selection box
    const selectBox = document.createElement("div");
    selectBox.className = "multiselect-select-box";
    selectBox.setAttribute("tabindex", "0");

    const selectedText = document.createElement("span");
    selectedText.className = "selected-text placeholder-text";

    // Set initial placeholder based on select id or class
    let placeholder = "Select options...";
    if (
      selectElement.id === "car-list-fuel" ||
      selectElement.classList.contains("inline-edit-fuel")
    ) {
      placeholder = "Select Fuel Types...";
    } else if (
      selectElement.id === "car-list-body" ||
      selectElement.classList.contains("inline-edit-body")
    ) {
      placeholder = "Select Body Types...";
    }
    selectedText.innerText = placeholder;

    const arrowIcon = document.createElement("i");
    arrowIcon.className = "fas fa-chevron-down arrow-icon";

    selectBox.appendChild(selectedText);
    selectBox.appendChild(arrowIcon);
    container.appendChild(selectBox);

    // Create dropdown menu
    const dropdown = document.createElement("div");
    dropdown.className = "multiselect-dropdown";
    container.appendChild(dropdown);

    // Populate options
    const updateDropdownOptions = () => {
      dropdown.innerHTML = "";
      Array.from(selectElement.options).forEach((opt, idx) => {
        const optionWrapper = document.createElement("div");
        optionWrapper.className = "multiselect-option";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.value = opt.value;
        checkbox.checked = opt.selected;

        const label = document.createElement("span");
        label.innerText = opt.text;

        optionWrapper.appendChild(checkbox);
        optionWrapper.appendChild(label);
        dropdown.appendChild(optionWrapper);

        // Click handler for option row
        optionWrapper.addEventListener("click", (e) => {
          if (e.target !== checkbox) {
            checkbox.checked = !checkbox.checked;
          }
          opt.selected = checkbox.checked;

          // Trigger change event on original select
          const changeEvent = new Event("change", { bubbles: true });
          selectElement.dispatchEvent(changeEvent);

          updateSelectionText();
        });
      });
    };

    const updateSelectionText = () => {
      const selected = Array.from(selectElement.options)
        .filter((opt) => opt.selected)
        .map((opt) => opt.text);

      if (selected.length > 0) {
        selectedText.innerText = selected.join(", ");
        selectedText.classList.remove("placeholder-text");
      } else {
        selectedText.innerText = placeholder;
        selectedText.classList.add("placeholder-text");
      }
    };

    // Toggle dropdown
    selectBox.addEventListener("click", (e) => {
      e.stopPropagation();

      const isOpen = container.classList.contains("active");

      document.querySelectorAll(".multiselect-container").forEach((c) => {
        if (c !== container) {
          c.classList.remove("active");
          c.classList.remove("open-upward");
        }
      });

      if (isOpen) {
        container.classList.remove("active");
        container.classList.remove("open-upward");
      } else {
        container.classList.add("active");

        // Dynamic direction detection (up or down based on space)
        const rect = selectBox.getBoundingClientRect();
        const spaceBelow = window.innerHeight - rect.bottom;
        const dropdownHeight = 250; // max-height of dropdown

        if (spaceBelow < dropdownHeight && rect.top > dropdownHeight) {
          container.classList.add("open-upward");
        }
      }
    });

    // Close on click outside
    document.addEventListener("click", (e) => {
      if (!container.contains(e.target)) {
        container.classList.remove("active");
        container.classList.remove("open-upward");
      }
    });

    // Sync on external change (e.g. form reset or value update)
    selectElement.addEventListener("change", () => {
      const checkboxes = dropdown.querySelectorAll("input[type='checkbox']");
      Array.from(selectElement.options).forEach((opt, idx) => {
        if (checkboxes[idx]) {
          checkboxes[idx].checked = opt.selected;
        }
      });
      updateSelectionText();
    });

    // Sync on form reset
    const form = selectElement.form;
    if (form) {
      form.addEventListener("reset", () => {
        setTimeout(() => {
          updateDropdownOptions();
          updateSelectionText();
        }, 0);
      });
    }

    // Initial render
    updateDropdownOptions();
    updateSelectionText();
  };

  function splitCommaValues(value) {
    if (!value) return [];
    return String(value)
      .split(",")
      .map((part) => part.trim())
      .filter(Boolean);
  }

  function joinSelectedOptions(selectElement) {
    return Array.from(selectElement.selectedOptions)
      .map((option) => option.value.trim())
      .filter(Boolean)
      .join(", ");
  }

  function escapeHtml(str) {
    if (!str) return "";
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function renderCommaValues(value, fallbackText = "-") {
    const values = splitCommaValues(value);
    if (!values.length) return `<span>${escapeHtml(fallbackText)}</span>`;
    return values
      .map(
        (item) =>
          `<span style="display:inline-block; margin:2px 6px 2px 0; background:#e0f2fe; color:#0369a1; padding:4px 10px; border-radius:20px; font-weight:600; font-size:0.85em;">${escapeHtml(item)}</span>`,
      )
      .join("");
  }

  function renderCarListTable(items, updateStats) {
    const tbody = document.getElementById("carListTableBody");
    if (!tbody) return;

    tbody.innerHTML = "";

    if (!items || items.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="7" class="text-center" style="padding: 30px; color: #7f8c8d">
            <i class="fas fa-folder-open" style="font-size: 24px; display: block; margin-bottom: 10px; color: #bdc3c7"></i>
            No reference vehicle records found.
          </td>
        </tr>
      `;
      if (updateStats) {
        const totalCarsEl = document.getElementById("stats-total-cars");
        if (totalCarsEl) totalCarsEl.innerText = "0";
        const uniqueMakesEl = document.getElementById("stats-unique-makes");
        if (uniqueMakesEl) uniqueMakesEl.innerText = "0";
        const uniqueModelsEl = document.getElementById("stats-unique-models");
        if (uniqueModelsEl) uniqueModelsEl.innerText = "0";
        const popularFuelEl = document.getElementById("stats-popular-fuel");
        if (popularFuelEl) popularFuelEl.innerText = "-";
      }
      return;
    }

    items.forEach((item) => {
      const tr = document.createElement("tr");
      tr.id = "car-row-" + item.rowNumber;

      tr.innerHTML = `
        <td class="brand-cell" style="font-weight: 600; color: #2c3e50;">${escapeHtml(item.carName)}</td>
        <td class="model-cell">${escapeHtml(item.model)}</td>
        <td class="trim-cell">${escapeHtml(item.trim || "-")}</td>
        <td class="fuel-cell">${renderCommaValues(item.fuelType)}</td>
        <td class="body-cell">${renderCommaValues(item.bodyType)}</td>
        <td class="years-cell">
          <i class="far fa-calendar-alt text-muted" style="margin-right: 5px"></i>
          ${escapeHtml(item.yearsSold)}
        </td>
        <td style="text-align: center; white-space: nowrap;">
          <button class="action-btn-sm btn-edit-item" onclick="toggleCarRowEdit(${item.rowNumber}, true)">
            <i class="fas fa-edit"></i> Edit
          </button>
          <button class="action-btn-sm btn-delete-item" onclick="deleteCarRowItem(${item.rowNumber}, \`${escapeHtml(item.carName)}\`, \`${escapeHtml(item.model)}\`)">
            <i class="fas fa-trash-alt"></i> Delete
          </button>
        </td>
      `;
      tbody.appendChild(tr);
    });

    if (updateStats) {
      // Calculate and update stats from all cached items
      const totalCount = window.cachedCarList.length;
      const totalCarsEl = document.getElementById("stats-total-cars");
      if (totalCarsEl) totalCarsEl.innerText = totalCount;

      const uniqueMakes = new Set();
      const uniqueModels = new Set();
      const fuelCounts = {};

      window.cachedCarList.forEach((car) => {
        if (car.carName) uniqueMakes.add(car.carName.toLowerCase().trim());
        if (car.model) uniqueModels.add(car.model.toLowerCase().trim());
        if (car.fuelType) {
          splitCommaValues(car.fuelType).forEach((fuel) => {
            fuelCounts[fuel] = (fuelCounts[fuel] || 0) + 1;
          });
        }
      });

      const uniqueMakesEl = document.getElementById("stats-unique-makes");
      if (uniqueMakesEl) uniqueMakesEl.innerText = uniqueMakes.size;

      const uniqueModelsEl = document.getElementById("stats-unique-models");
      if (uniqueModelsEl) uniqueModelsEl.innerText = uniqueModels.size;

      let topFuel = "-";
      let maxFuelCount = 0;
      for (const fuel in fuelCounts) {
        if (fuelCounts[fuel] > maxFuelCount) {
          maxFuelCount = fuelCounts[fuel];
          topFuel = fuel;
        }
      }
      const popularFuelEl = document.getElementById("stats-popular-fuel");
      if (popularFuelEl) popularFuelEl.innerText = topFuel;
    }
  }

  window.filterCarListTable = function () {
    const searchInput = document.getElementById("carListSearchFilter");
    if (!searchInput) return;

    const query = searchInput.value.toLowerCase().trim();
    if (!query) {
      renderCarListTable(window.cachedCarList, false);
      return;
    }

    const filtered = window.cachedCarList.filter((item) => {
      const name = (item.carName || "").toLowerCase();
      const model = (item.model || "").toLowerCase();
      const trim = (item.trim || "").toLowerCase();
      const fuel = (item.fuelType || "").toLowerCase();
      const body = (item.bodyType || "").toLowerCase();
      return (
        name.includes(query) ||
        model.includes(query) ||
        trim.includes(query) ||
        fuel.includes(query) ||
        body.includes(query)
      );
    });

    renderCarListTable(filtered, false); // do not reset global stats
  };

    const modelVal = modelInput.value.trim();

    const bodyVal = joinSelectedOptions(bodyInput);

      bodyType: bodyVal,

  window.editExpenseRow = function (

    if (form) {
      const carIdSelect = document.getElementById("expenseCarId");
      const modelSelect = document.getElementById("expenseCarModel");
      const clientSelect = document.getElementById("expenseClientName");

      if (carIdSelect && carId) {

          !Array.from(carIdSelect.options).some((opt) => opt.value === carId)
        ) {
          carIdSelect.innerHTML += `<option value="${carId}">${carId}</option>`;
        }
        carIdSelect.value = carId;

      if (modelSelect && carModel) {
        if (
          !Array.from(modelSelect.options).some((opt) => opt.value === carModel)
        ) {
          modelSelect.innerHTML += `<option value="${carModel}">${carModel}</option>`;
        }
        modelSelect.value = carModel;
      }
      if (clientSelect) {
        clientSelect.value = clientName || "";
      }

      if (dateStr) {
        try {
          let d = new Date(dateStr);
          if (!isNaN(d.getTime())) {
            let yyyy = d.getFullYear();
            let mm = String(d.getMonth() + 1).padStart(2, "0");
            let dd = String(d.getDate()).padStart(2, "0");
            form.querySelector('[name="expenseDate"]').value =
              `${yyyy}-${mm}-${dd}`;
          } else {
            form.querySelector('[name="expenseDate"]').value = dateStr;
          }
        } catch (e) {
          form.querySelector('[name="expenseDate"]').value = dateStr;
        }
      }
      form.querySelector('[name="description"]').value = description || "";
      const paidBySelect = document.getElementById("expensePaidBy");
      const assocNameInput = document.getElementById("expense-associate-name");
      if (paidBySelect) {
        if (paidBy.startsWith("Associate:")) {
          paidBySelect.value = "Associate";
          if (assocNameInput) {
            assocNameInput.value = paidBy.replace("Associate:", "").trim();
          }
        } else {
          paidBySelect.value = paidBy || "Company";
          if (assocNameInput) assocNameInput.value = "";
        }
        window.toggleExpenseAssociateNameInput();
      }
      form.querySelector('[name="amount"]').value = amount || "";
    }

    const card = document
      .getElementById("addExpenseForm")
      .closest(".expenses-card");
    if (card) {
      card.scrollIntoView({ behavior: "smooth", block: "start" });

  window.editPaymentRow = function (
    rowNumber,
    carId,
    carModel,
    clientName,
    dateStr,
    paymentOption,
    notes,
    amount,
  ) {
    window.editingPaymentRow = rowNumber;

    const title = document.getElementById("paymentFormTitle");
    if (title) title.innerText = "Edit Payment Record (Row " + rowNumber + ")";

    const icon = document.getElementById("paymentFormIcon");
    if (icon) {
      icon.innerHTML = '<i class="fas fa-edit"></i>';
      icon.className = "icon-square bg-emerald-light";
    }

    const badge = document.getElementById("paymentFormBadge");
    if (badge) {
      badge.innerHTML = '<i class="fas fa-edit"></i> Editing Mode Active';
      badge.style.background = "#fff3cd";
      badge.style.color = "#856404";
      badge.style.border = "1px solid #ffeeba";
    }

    const cancelBtn = document.getElementById("btnCancelPaymentEdit");
    if (cancelBtn) cancelBtn.style.display = "inline-flex";

    const submitBtn = document.getElementById("btnSubmitPayment");
    if (submitBtn)
      submitBtn.innerHTML =
        '<i class="fas fa-check-circle"></i> Update Payment';

    const form = document.getElementById("add-payment-form");
    if (form) {
      const carIdSelect = document.getElementById("pay-car-id");
      const modelSelect = document.getElementById("pay-car-model");
      const clientSelect = document.getElementById("pay-client-name");

      if (carIdSelect && carId) {
        if (
          !Array.from(carIdSelect.options).some((opt) => opt.value === carId)
        ) {
          carIdSelect.innerHTML += `<option value="${carId}">${carId}</option>`;
        }
        carIdSelect.value = carId;
      }
      if (modelSelect && carModel) {
        if (
          !Array.from(modelSelect.options).some((opt) => opt.value === carModel)
        ) {
          modelSelect.innerHTML += `<option value="${carModel}">${carModel}</option>`;
        }
        modelSelect.value = carModel;
      }
      if (clientSelect) {
        clientSelect.value = clientName || "";
      }

      if (dateStr) {
        try {
          let d = new Date(dateStr);
          if (!isNaN(d.getTime())) {
            let yyyy = d.getFullYear();
            let mm = String(d.getMonth() + 1).padStart(2, "0");
            let dd = String(d.getDate()).padStart(2, "0");
            document.getElementById("pay-date").value = `${yyyy}-${mm}-${dd}`;
          } else {
            document.getElementById("pay-date").value = dateStr;
          }
        } catch (e) {
          document.getElementById("pay-date").value = dateStr;
        }
      }

      const payOptionSelect = document.getElementById("pay-option");
      if (payOptionSelect && paymentOption) {
        if (
          !Array.from(payOptionSelect.options).some(
            (opt) => opt.value === paymentOption,
          )
        ) {
          payOptionSelect.innerHTML += `<option value="${paymentOption}">${paymentOption}</option>`;
        }
        payOptionSelect.value = paymentOption;
      }

      document.getElementById("pay-amount").value = amount || "";
      document.getElementById("pay-notes").value = notes || "";
    }

    const card = document
      .getElementById("add-payment-form")
      .closest(".expenses-card");
    if (card) {
      card.scrollIntoView({ behavior: "smooth", block: "start" });
      card.style.transition = "all 0.3s";
      card.style.boxShadow = "0 0 20px rgba(35, 39, 84, 0.4)";
      setTimeout(() => {
        card.style.boxShadow = "";
      }, 1500);
    }
  };
