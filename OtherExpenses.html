<!-- Other Expenses View -->
<div id="view-other-expenses" class="view form-view">
  <style>
    /* Custom specific styling if any */
  </style>

  <div
    class="creative-expenses-header"
    style="background: linear-gradient(135deg, #170a3d 0%, #3a1f62 100%)"
  >
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="expenses-header-content">
      <h1><i class="fas fa-receipt"></i> Other Expenses</h1>
      <p>
        Log, track, and monitor other business and miscellaneous expenditures.
      </p>
    </div>
  </div>

  <!-- Add Expenses Card -->
  <div class="expenses-card">
    <div class="expenses-card-header">
      <h3 style="display: flex; align-items: center; gap: 10px">
        <span
          class="icon-square"
          id="otherExpenseFormIcon"
          style="background: #fae8ff; color: #86198f"
          ><i class="fas fa-plus"></i
        ></span>
        <span id="otherExpenseFormTitle">Log New Other Expense</span>
      </h3>
    </div>

    <form
      id="addOtherExpenseForm"
      class="creative-form"
      onsubmit="handleOtherExpenseSubmit(event)"
      onreset="setTimeout(toggleOtherAssociateNameInput, 0)"
    >
      <div class="grid-responsive" style="gap: 25px">
        <div class="input-group" style="grid-column: span 2">
          <label class="required-label">Details</label>
          <div class="modern-input-wrapper">
            <input
              type="text"
              name="otherDetails"
              id="other-details"
              class="form-control"
              placeholder="E.g., Office maintenance, software licenses, other events..."
              required
            />
            <i class="fas fa-align-left"></i>
          </div>
        </div>

        <div class="input-group">
          <label>Value Before Tax ($)</label>
          <div class="modern-input-wrapper">
            <input
              type="number"
              step="0.01"
              min="0"
              name="otherValueBeforeTax"
              id="other-value-before-tax"
              class="form-control"
              placeholder="0.00"
              oninput="calculateOtherTax()"
            />
            <i class="fas fa-dollar-sign"></i>
          </div>
        </div>

        <div class="input-group">
          <label class="required-label">Value After Tax ($)</label>
          <div class="modern-input-wrapper">
            <input
              type="number"
              step="0.01"
              min="0"
              name="otherValueAfterTax"
              id="other-value-after-tax"
              class="form-control"
              placeholder="0.00"
              required
            />
            <i class="fas fa-file-invoice-dollar"></i>
          </div>
        </div>

        <div class="input-group">
          <label class="required-label">Date</label>
          <div class="modern-input-wrapper">
            <input
              type="date"
              name="otherDate"
              id="other-date"
              class="form-control"
              required
            />
            <i class="fas fa-calendar-alt"></i>
          </div>
        </div>

        <div class="input-group">
          <label class="required-label">Paid By</label>
          <div class="modern-input-wrapper">
            <select
              name="otherPaidBy"
              id="other-paid-by"
              class="form-control"
              required
              onchange="toggleOtherAssociateNameInput()"
            >
              <option value="Company">Company</option>
              <option value="Associate">Associate</option>
            </select>
            <i class="fas fa-user-check"></i>
          </div>
        </div>

        <div
          class="input-group"
          id="other-associate-name-group"
          style="display: none"
        >
          <label class="required-label">Associate Name</label>
          <div class="modern-input-wrapper">
            <input
              type="text"
              name="otherAssociateName"
              id="other-associate-name"
              class="form-control"
              placeholder="Enter associate's name..."
            />
            <i class="fas fa-user"></i>
          </div>
        </div>
      </div>

      <div
        style="
          display: flex;
          justify-content: flex-end;
          gap: 15px;
          margin-top: 35px;
        "
      >
        <button
          type="button"
          id="btnCancelOtherExpenseEdit"
          class="btn-secondary"
          style="padding: 14px 25px; border-radius: 30px; display: none"
          onclick="window.cancelOtherExpenseEdit()"
        >
          Cancel Edit
        </button>
        <button
          type="reset"
          class="btn-secondary"
          style="padding: 14px 25px; border-radius: 30px"
        >
          <i class="fas fa-undo"></i> Clear
        </button>
        <button
          type="submit"
          class="btn-gradient-submit"
          id="btnSubmitOtherExpense"
          style="
            background: linear-gradient(to right, #2b1055, #2b1055);
            box-shadow: 0 4px 15px rgba(117, 151, 222, 0.4);
            display: inline-flex;
          "
        >
          <i class="fas fa-check-circle"></i> Save Other Expense
        </button>
      </div>
    </form>
  </div>

  <!-- View Other Expenses Card -->
  <div class="expenses-card">
    <div
      class="expenses-card-header"
      style="
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        align-items: center;
        justify-content: space-between;
      "
    >
      <h3 style="margin: 0">
        <span class="icon-square" style="background: #fdf2f8; color: #9d174d"
          ><i class="fas fa-list-ul"></i
        ></span>
        Other Expense History
      </h3>
      <div
        style="
          display: flex;
          gap: 10px;
          flex-grow: 1;
          justify-content: flex-end;
          align-items: center;
        "
      >
        <div style="position: relative; max-width: 250px; width: 100%">
          <i
            class="fas fa-search"
            style="
              position: absolute;
              left: 12px;
              top: 50%;
              transform: translateY(-50%);
              color: #aaa;
            "
          ></i>
          <input
            type="text"
            id="otherSearchInput"
            class="form-control"
            placeholder="Search all columns..."
            onkeydown="if (event.key === 'Enter') filterOtherExpenses();"
            style="
              padding-left: 35px;
              border-radius: 20px;
              box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            "
          />
        </div>
        <button
          onclick="filterOtherExpenses()"
          class="btn-secondary"
          style="
            border-radius: 20px;
            font-size: 0.9rem;
            padding: 8px 18px;
            cursor: pointer;
          "
        >
          <i class="fas fa-search"></i> Search
        </button>
        <button
          onclick="resetOtherExpenses()"
          class="btn-secondary"
          style="
            border-radius: 20px;
            font-size: 0.9rem;
            padding: 8px 18px;
            cursor: pointer;
          "
        >
          <i class="fas fa-undo"></i> Reset
        </button>
        <button
          onclick="loadOtherExpenses()"
          class="btn-secondary"
          style="
            border-radius: 20px;
            font-size: 0.9rem;
            padding: 8px 15px;
            cursor: pointer;
          "
        >
          <i class="fas fa-sync-alt"></i> Refresh Data
        </button>
      </div>
    </div>

    <div class="expenses-table-wrapper">
      <table class="creative-table">
        <thead>
          <tr>
            <th><i class="fas fa-align-left mr-2"></i> Details</th>
            <th><i class="fas fa-dollar-sign mr-2"></i> Value Before Tax</th>
            <th>
              <i class="fas fa-file-invoice-dollar mr-2"></i> Value After Tax
            </th>
            <th><i class="fas fa-calendar-alt mr-2"></i> Date</th>
            <th><i class="fas fa-user-check mr-2"></i> Paid By</th>
            <th><i class="fas fa-cog mr-2"></i> Actions</th>
          </tr>
        </thead>
        <tbody id="otherExpensesTableBody">
          <tr>
            <td colspan="6" class="text-center" style="padding: 40px">
              <i
                class="fas fa-circle-notch fa-spin fa-2x text-primary"
                style="margin-bottom: 15px; display: block"
              ></i>
              Loading other expenses...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
