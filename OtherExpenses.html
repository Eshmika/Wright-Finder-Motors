<!-- Other Expenses View -->
<div id="view-other-expenses" class="view form-view">
  <style>
    /* Custom specific styling if any */
  </style>

  <div
    class="creative-expenses-header"
    style="background: linear-gradient(135deg, #2b1055, #7597de)"
  >
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="expenses-header-content">
      <h1><i class="fas fa-receipt"></i> Other Expenses</h1>
      <p>
        Log, track, and monitor other business and miscellaneous expenditures.
      </p>
    </div>
  </div>

  <!-- Add Expenses Card -->
  <div class="expenses-card">
    <div class="expenses-card-header">
      <h3>
        <span class="icon-square" style="background: #fae8ff; color: #86198f"
          ><i class="fas fa-plus"></i
        ></span>
        Log New Other Expense
      </h3>
    </div>

    <form
      id="addOtherExpenseForm"
      class="creative-form"
      onsubmit="handleOtherExpenseSubmit(event)"
    >
      <div class="grid-responsive" style="gap: 25px">
        <div class="input-group" style="grid-column: span 2">
          <label class="required-label">Details</label>
          <div class="modern-input-wrapper">
            <input
              type="text"
              name="otherDetails"
              id="other-details"
              class="form-control"
              placeholder="E.g., Office maintenance, software licenses, other events..."
              required
            />
            <i class="fas fa-align-left"></i>
          </div>
        </div>

        <div class="input-group">
          <label class="required-label">Value Before Tax ($)</label>
          <div class="modern-input-wrapper">
            <input
              type="number"
              step="0.01"
              min="0"
              name="otherValueBeforeTax"
              id="other-value-before-tax"
              class="form-control"
              placeholder="0.00"
              required
              oninput="calculateOtherTax()"
            />
            <i class="fas fa-dollar-sign"></i>
          </div>
        </div>

        <div class="input-group">
          <label class="required-label">Value After Tax ($)</label>
          <div class="modern-input-wrapper">
            <input
              type="number"
              step="0.01"
              min="0"
              name="otherValueAfterTax"
              id="other-value-after-tax"
              class="form-control"
              placeholder="0.00"
              required
            />
            <i class="fas fa-file-invoice-dollar"></i>
          </div>
        </div>

        <div class="input-group">
          <label class="required-label">Date</label>
          <div class="modern-input-wrapper">
            <input
              type="date"
              name="otherDate"
              id="other-date"
              class="form-control"
              required
            />
            <i class="fas fa-calendar-alt"></i>
          </div>
        </div>

        <div class="input-group">
          <label class="required-label">Paid By</label>
          <div class="modern-input-wrapper">
            <input
              type="text"
              name="otherPaidBy"
              id="other-paid-by"
              list="otherPaidByOptions"
              class="form-control"
              placeholder="Name or entity..."
              required
            />
            <datalist id="otherPaidByOptions">
              <option value="Company"></option>
              <option value="Associate"></option>
            </datalist>
            <i class="fas fa-user-check"></i>
          </div>
        </div>
      </div>

      <div
        style="
          display: flex;
          justify-content: flex-end;
          gap: 15px;
          margin-top: 35px;
        "
      >
        <button
          type="reset"
          class="btn-secondary"
          style="padding: 14px 25px; border-radius: 30px"
        >
          <i class="fas fa-undo"></i> Clear
        </button>
        <button
          type="submit"
          class="btn-gradient-submit"
          id="btnSubmitOtherExpense"
          style="
            background: linear-gradient(to right, #2b1055, #2b1055);
            box-shadow: 0 4px 15px rgba(117, 151, 222, 0.4);
            display: inline-flex;
          "
        >
          <i class="fas fa-check-circle"></i> Save Other Expense
        </button>
      </div>
    </form>
  </div>

  <!-- View Other Expenses Card -->
  <div class="expenses-card">
    <div
      class="expenses-card-header"
      style="
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        align-items: center;
        justify-content: space-between;
      "
    >
      <h3 style="margin: 0">
        <span class="icon-square" style="background: #fdf2f8; color: #9d174d"
          ><i class="fas fa-list-ul"></i
        ></span>
        Other Expense History
      </h3>
      <div
        style="
          display: flex;
          gap: 10px;
          flex-grow: 1;
          justify-content: flex-end;
          align-items: center;
        "
      >
        <div style="position: relative; max-width: 200px; width: 100%">
          <i
            class="fas fa-search"
            style="
              position: absolute;
              left: 12px;
              top: 50%;
              transform: translateY(-50%);
              color: #aaa;
            "
          ></i>
          <input
            type="text"
            id="otherNameFilter"
            class="form-control"
            placeholder="Filter by name/details..."
            onkeyup="filterOtherExpenses()"
            style="
              padding-left: 35px;
              border-radius: 20px;
              box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            "
          />
        </div>
        <div style="position: relative; max-width: 180px; width: 100%">
          <i
            class="fas fa-calendar-alt"
            style="
              position: absolute;
              left: 12px;
              top: 50%;
              transform: translateY(-50%);
              color: #aaa;
              z-index: 5;
            "
          ></i>
          <input
            type="date"
            id="otherDateFilter"
            class="form-control"
            onchange="filterOtherExpenses()"
            style="
              padding-left: 35px;
              border-radius: 20px;
              box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            "
          />
        </div>
        <div style="position: relative; max-width: 180px; width: 100%">
          <i
            class="fas fa-user"
            style="
              position: absolute;
              left: 12px;
              top: 50%;
              transform: translateY(-50%);
              color: #aaa;
            "
          ></i>
          <input
            type="text"
            id="otherPayerFilter"
            class="form-control"
            placeholder="Filter by payer..."
            onkeyup="filterOtherExpenses()"
            style="
              padding-left: 35px;
              border-radius: 20px;
              box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            "
          />
        </div>
        <button
          onclick="loadOtherExpenses()"
          class="btn-secondary"
          style="
            border-radius: 20px;
            font-size: 0.9rem;
            padding: 8px 15px;
            background-color: #717384;
          "
        >
          <i class="fas fa-sync-alt"></i> Refresh Data
        </button>
      </div>
    </div>

    <div class="expenses-table-wrapper">
      <table class="creative-table">
        <thead>
          <tr>
            <th><i class="fas fa-align-left mr-2"></i> Details</th>
            <th><i class="fas fa-dollar-sign mr-2"></i> Value Before Tax</th>
            <th>
              <i class="fas fa-file-invoice-dollar mr-2"></i> Value After Tax
            </th>
            <th><i class="fas fa-calendar-alt mr-2"></i> Date</th>
            <th><i class="fas fa-user-check mr-2"></i> Paid By</th>
          </tr>
        </thead>
        <tbody id="otherExpensesTableBody">
          <tr>
            <td colspan="5" class="text-center" style="padding: 40px">
              <i
                class="fas fa-circle-notch fa-spin fa-2x text-primary"
                style="margin-bottom: 15px; display: block"
              ></i>
              Loading other expenses...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
