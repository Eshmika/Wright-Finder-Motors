<!-- Add New Car View -->
<div id="view-buy-add-new" class="view form-view">
  <div class="view-header">
    <h1 class="view-title">
      <i class="fas fa-car-side title-icon"></i> Add New Vehicle
    </h1>
    <p class="view-subtitle">
      Enter comprehensive details to list a new car in our inventory.
    </p>
  </div>

  <form id="addCarForm" class="creative-form" onsubmit="handleCarSubmit(event)">
    <!-- Image Uploads -->
    <div class="form-section shadow-sm">
      <h3 class="section-title">
        <span class="icon-wrap"><i class="fas fa-images"></i></span>
        Vehicle Imagery
      </h3>
      <div class="grid-2-col upload-grid">
        <div class="input-group">
          <label>Main Header Image</label>
          <div class="file-upload-wrapper">
            <i class="fas fa-cloud-upload-alt upload-icon"></i>
            <p>Drag or Click to Upload</p>
            <input
              type="file"
              name="mainImage"
              accept="image/*"
              class="file-input"
              required
            />
          </div>
        </div>
        <div class="input-group">
          <label>Sub Images (Gallery)</label>
          <div class="file-upload-wrapper">
            <i class="fas fa-images upload-icon"></i>
            <p>Select Multiple Images</p>
            <input
              type="file"
              name="subImages"
              accept="image/*"
              multiple
              class="file-input"
              required
            />
          </div>
        </div>
      </div>
    </div>

    <!-- Basic Details -->
    <div class="form-section shadow-sm">
      <h3 class="section-title">
        <span class="icon-wrap"><i class="fas fa-info-circle"></i></span>
        Basic Details
      </h3>
      <div class="grid-responsive">
        <div class="input-group">
          <label>Car Name</label>
          <input
            type="text"
            name="carName"
            class="form-control"
            placeholder="e.g. Ford Mustang"
            required
          />
        </div>
        <div class="input-group">
          <label>Model</label>
          <input
            type="text"
            name="model"
            class="form-control"
            placeholder="e.g. GT Premium"
            required
          />
        </div>
        <div class="input-group">
          <label>Year</label>
          <select name="year" id="yearSelect" class="form-control" required>
            <option value="">Select Year...</option>
          </select>
        </div>
        <div class="input-group">
          <label>Mileage</label>
          <input
            type="text"
            name="mileage"
            class="form-control"
            maxlength="7"
            placeholder="e.g. 120,000"
            pattern="[0-9,]+"
            title="Only numbers and commas limit 6-7 char"
            required
          />
        </div>
        <div class="input-group">
          <label>Price ($)</label>
          <input
            type="number"
            name="price"
            class="form-control"
            placeholder="e.g. 25000"
            min="0"
            required
          />
        </div>
        <div class="input-group">
          <label>Discount ($)</label>
          <input
            type="number"
            name="discount"
            class="form-control"
            placeholder="e.g. 1000"
            min="0"
          />
        </div>
        <div class="input-group">
          <label>VIN Number</label>
          <input
            type="text"
            name="vin"
            class="form-control"
            maxlength="17"
            pattern=".{17}"
            title="Must be exactly 17 characters"
            placeholder="17 Characters"
            required
          />
        </div>
        <div class="input-group">
          <label>Status</label>
          <select name="status" class="form-control" required>
            <option value="Available">Available</option>
            <option value="Sold">Sold</option>
            <option value="Pending">Pending</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Classification -->
    <div class="form-section shadow-sm">
      <h3 class="section-title">
        <span class="icon-wrap"><i class="fas fa-tags"></i></span>
        Classification
      </h3>
      <div class="grid-responsive">
        <div class="input-group">
          <label>Title</label>
          <select name="title" class="form-control">
            <option>Clean</option>
            <option>Rebuilt</option>
            <option>Lien</option>
            <option>Salvage</option>
          </select>
        </div>
        <div class="input-group">
          <label>Style of Car</label>
          <select name="styleOfCar" class="form-control">
            <option>4 Door</option>
            <option>2 Door</option>
          </select>
        </div>
        <div class="input-group">
          <label>Body Style</label>
          <select name="bodyStyle" class="form-control">
            <option>Sedan</option>
            <option>SUV</option>
            <option>Sport</option>
            <option>Hatchback</option>
            <option>N/a</option>
          </select>
        </div>
        <div class="input-group">
          <label>Rent or Sell</label>
          <select name="rentOrSell" class="form-control">
            <option>Sell</option>
            <option>Rent</option>
            <option>Both</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Engine & Performance -->
    <div class="form-section shadow-sm">
      <h3 class="section-title">
        <span class="icon-wrap"><i class="fas fa-cogs"></i></span>
        Performance & Specs
      </h3>
      <div class="grid-responsive">
        <div class="input-group">
          <label>Engine</label>
          <select name="engine" class="form-control">
            <option>Non sport</option>
            <option>Sport</option>
          </select>
        </div>
        <div class="input-group">
          <label>Engine Type/Size</label>
          <select name="engineType" class="form-control">
            <option>2.5L 4 cylinder</option>
            <option>V6</option>
            <option>V8</option>
            <option>hybrid</option>
          </select>
        </div>
        <div class="input-group">
          <label>Transmission</label>
          <select name="transmission" class="form-control">
            <option>Automatic</option>
            <option>Manual</option>
            <option>CVT(continuously variable)</option>
          </select>
        </div>
        <div class="input-group">
          <label>Driveline</label>
          <select name="driveline" class="form-control">
            <option>FWD</option>
            <option>RWD</option>
            <option>AWD</option>
            <option>4WD</option>
          </select>
        </div>
        <div class="input-group">
          <label>Fuel Type</label>
          <select name="fuelType" class="form-control">
            <option>Gasoline</option>
            <option>Diesel</option>
            <option>Hybrid</option>
            <option>Electric</option>
          </select>
        </div>
        <div class="input-group">
          <label>Power Options</label>
          <select name="power" class="form-control">
            <option>Keyless</option>
            <option>Remote</option>
            <option>Key entry</option>
          </select>
        </div>
        <div class="input-group">
          <label>Drive Condition</label>
          <select name="driveCondition" class="form-control">
            <option>Runs/drives</option>
            <option>Run, stationed</option>
            <option>n/a</option>
          </select>
        </div>
        <div class="input-group">
          <label>Condition</label>
          <select name="condition" class="form-control">
            <option>New</option>
            <option>Pre-owned</option>
            <option>Used</option>
            <option>Salvage</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Interior & Exterior -->
    <div class="form-section shadow-sm">
      <h3 class="section-title">
        <span class="icon-wrap"><i class="fas fa-palette"></i></span>
        Aesthetics & Features
      </h3>
      <div class="grid-responsive">
        <div class="input-group">
          <label>Seat Material</label>
          <select name="seatMaterial" class="form-control">
            <option>Leather</option>
            <option>Clothes</option>
          </select>
        </div>
        <div class="input-group">
          <label>Interior Color</label>
          <select name="interiorColor" class="form-control">
            <option>Black</option>
            <option>White</option>
            <option>Gray</option>
            <option>Beige</option>
            <option>Brown</option>
            <option>Tan</option>
            <option>Ivory/Cream</option>
            <option>Charcoal</option>
            <option>Multi-color</option>
            <option>Other(Name)</option>
          </select>
        </div>
        <div class="input-group">
          <label>Exterior Color</label>
          <select name="exteriorColor" class="form-control">
            <option>White</option>
            <option>Black</option>
            <option>Silver</option>
            <option>Gray</option>
            <option>Beige</option>
            <option>Blue</option>
            <option>Red</option>
            <option>Green</option>
            <option>Brown</option>
            <option>Yellow</option>
            <option>Gold</option>
            <option>Multi-color</option>
            <option>Other(Name)</option>
          </select>
        </div>
      </div>

      <div class="input-group mt-4">
        <label
          >Interior Features
          <span class="text-muted">(Type comma to add multiple)</span></label
        >
        <div class="tags-input-container">
          <ul id="featuresList" class="tags-list"></ul>
          <input
            type="text"
            id="featureInput"
            class="tag-input"
            placeholder="e.g. Nav System, Bluetooth, Heated Seats"
          />
          <input type="hidden" name="interiorFeatures" id="hiddenFeatures" />
        </div>
      </div>

      <div class="input-group mt-4">
        <label>Description</label>
        <textarea
          name="description"
          rows="4"
          class="form-control"
          placeholder="Provide a detailed description of the vehicle..."
        ></textarea>
      </div>
    </div>

    <div class="form-actions glass-panel">
      <button type="submit" class="btn-save-creative">
        <div class="btn-bg"></div>
        <span
          ><i class="fas fa-cloud-upload-alt btn-icon"></i> Save & Publish
          Vehicle</span
        >
      </button>
    </div>
  </form>
</div>
