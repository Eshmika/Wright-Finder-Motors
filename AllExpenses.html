<!-- All Expenses View -->
<div id="view-all-expenses" class="view form-view">
  <style>
    /* Creative & Modern Styling for Expenses */
    .creative-expenses-header {
      background: linear-gradient(
        135deg,
        var(--primary) 0%,
        rgba(133, 135, 150, 0.9) 100%
      );
      border-radius: 16px;
      padding: 35px 30px;
      color: white;
      position: relative;
      overflow: hidden;
      margin-bottom: 35px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
    }
    .creative-expenses-header .bg-shape {
      position: absolute;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
    }
    .creative-expenses-header .bg-shape.shape1 {
      width: 300px;
      height: 300px;
      top: -100px;
      right: -50px;
    }
    .creative-expenses-header .bg-shape.shape2 {
      width: 150px;
      height: 150px;
      bottom: -50px;
      right: 200px;
    }

    .expenses-header-content {
      position: relative;
      z-index: 1;
    }
    .expenses-header-content h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .expenses-header-content h1 i {
      color: #ffd700;
      margin-right: 12px;
      filter: drop-shadow(0 2px 4px rgba(255, 215, 0, 0.4));
    }
    .expenses-header-content p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .expenses-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 35px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(0, 0, 0, 0.02);
      transition: transform 0.3s ease;
    }
    .expenses-card:hover {
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.06);
    }

    .expenses-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      border-bottom: 2px dashed #f1f3f9;
      padding-bottom: 15px;
    }
    .expenses-card-header h3 {
      font-size: 1.4rem;
      color: var(--dark);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .icon-square {
      width: 45px;
      height: 45px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      font-size: 1.2rem;
    }
    .bg-indigo-light {
      background: #e0c8f6;
      color: #6f42c1;
    }
    .bg-emerald-light {
      background: #d1f2e0;
      color: #20c997;
    }

    .expense-info-badge {
      background: #f8f9fc;
      color: #858796;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #eaecf4;
    }

    .modern-input-wrapper {
      position: relative;
    }
    .modern-input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #b7b9cc;
      font-size: 1.1rem;
      transition: color 0.3s;
    }
    .modern-input-wrapper .form-control {
      padding-left: 45px;
      height: 50px;
      border-radius: 10px;
      border: 2px solid #eaecf4;
      background: #f8f9fc;
      transition: all 0.3s;
      font-size: 1rem;
    }
    .modern-input-wrapper .form-control:focus {
      background: #ffffff;
      border-color: var(--primary);
      box-shadow: 0 0 0 0.2rem rgba(78, 115, 223, 0.1);
    }
    .modern-input-wrapper .form-control:focus + i,
    .modern-input-wrapper input:focus ~ i,
    .modern-input-wrapper select:focus ~ i {
      color: var(--primary);
    }

    .btn-gradient-submit {
      background: linear-gradient(to right, #1cc88a, #13855c);
      color: white;
      border: none;
      padding: 14px 35px;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(28, 200, 138, 0.4);
      transition: all 0.3s ease;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .btn-gradient-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(28, 200, 138, 0.6);
    }

    .expenses-table-wrapper {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #eaecf4;
    }
    .creative-table {
      width: 100%;
      border-collapse: collapse;
    }
    .creative-table th {
      background: #f8f9fc;
      padding: 16px 20px;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #858796;
      border-bottom: 2px solid #eaecf4;
    }
    .creative-table td {
      padding: 18px 20px;
      vertical-align: middle;
      border-bottom: 1px solid #eaecf4;
      color: #5a5c69;
    }
    .creative-table tr:hover td {
      background: rgba(78, 115, 223, 0.03);
    }

    .amount-badge {
      background: #e3fbef;
      color: #1cc88a;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 8px;
      display: inline-block;
    }
  </style>

  <!-- Modern Expenses Header -->
  <div class="creative-expenses-header">
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="expenses-header-content">
      <h1><i class="fas fa-wallet"></i> Manage Expenses</h1>
      <p>
        Seamlessly log, track, and monitor your vehicle expenditures in one
        place.
      </p>
    </div>
  </div>

  <!-- Add Expenses Card -->
  <div class="expenses-card">
    <div class="expenses-card-header">
      <h3>
        <span class="icon-square bg-indigo-light"
          ><i class="fas fa-plus"></i
        ></span>
        Log New Expense
      </h3>
      <div class="expense-info-badge">
        <i class="fas fa-magic"></i> Auto-matching enabled
      </div>
    </div>

    <form
      id="addExpenseForm"
      class="creative-form"
      onsubmit="handleExpenseSubmit(event)"
    >
      <div class="grid-responsive" style="gap: 25px">
        <div class="input-group">
          <label class="required-label">Car ID</label>
          <div class="modern-input-wrapper">
            <select
              name="carId"
              id="expenseCarId"
              class="form-control"
              onchange="syncExpenseDropdowns('carId')"
              required
            >
              <option value="">Select Car ID...</option>
            </select>
            <i class="fas fa-fingerprint"></i>
          </div>
        </div>

        <div class="input-group">
          <label class="required-label">Car Model</label>
          <div class="modern-input-wrapper">
            <select
              name="carModel"
              id="expenseCarModel"
              class="form-control"
              onchange="syncExpenseDropdowns('carModel')"
              required
            >
              <option value="">Select Model...</option>
            </select>
            <i class="fas fa-car-side"></i>
          </div>
        </div>

        <div class="input-group">
          <label>Client Name</label>
          <div class="modern-input-wrapper">
            <select
              name="clientName"
              id="expenseClientName"
              class="form-control"
              onchange="syncExpenseDropdowns('clientName')"
            >
              <option value="">Select Client...</option>
            </select>
            <i class="fas fa-user-tie"></i>
          </div>
        </div>

        <div class="input-group" style="grid-column: 1 / -1">
          <label class="required-label">Description</label>
          <div class="modern-input-wrapper">
            <input
              type="text"
              name="description"
              class="form-control"
              placeholder="E.g., Engine repair, new tires, detailing, transport fees..."
              required
            />
            <i class="fas fa-align-left"></i>
          </div>
        </div>

        <div class="input-group">
          <label class="required-label">Amount ($)</label>
          <div class="modern-input-wrapper">
            <input
              type="number"
              step="0.01"
              name="amount"
              class="form-control"
              placeholder="0.00"
              required
            />
            <i class="fas fa-dollar-sign"></i>
          </div>
        </div>

        <div class="input-group">
          <label class="required-label">Expense Date</label>
          <div class="modern-input-wrapper">
            <input
              type="date"
              name="expenseDate"
              id="expenseDate"
              class="form-control"
              required
            />
            <i class="fas fa-calendar-day"></i>
          </div>
        </div>
      </div>

      <div
        style="
          display: flex;
          justify-content: flex-end;
          gap: 15px;
          margin-top: 35px;
        "
      >
        <button
          type="reset"
          class="btn-secondary"
          style="padding: 14px 25px; border-radius: 30px"
        >
          <i class="fas fa-undo"></i> Clear
        </button>
        <button type="submit" class="btn-gradient-submit" id="btnSubmitExpense">
          <i class="fas fa-check-circle"></i> Save Expense Record
        </button>
      </div>
    </form>
  </div>

  <!-- View Expenses Card -->
  <div class="expenses-card">
    <div class="expenses-card-header">
      <h3>
        <span class="icon-square bg-emerald-light"
          ><i class="fas fa-list-ul"></i
        ></span>
        Recent Expense Records
      </h3>
      <button
        onclick="loadExpenses()"
        class="btn-secondary"
        style="border-radius: 20px; font-size: 0.9rem"
      >
        <i class="fas fa-sync-alt"></i> Refresh Data
      </button>
    </div>

    <div class="expenses-table-wrapper">
      <table class="creative-table">
        <thead>
          <tr>
            <th><i class="fas fa-car mr-2"></i> Car Model</th>
            <th><i class="fas fa-hashtag mr-2"></i> ID</th>
            <th><i class="fas fa-user-circle mr-2"></i> Client</th>
            <th><i class="fas fa-align-left mr-2"></i> Description</th>
            <th><i class="fas fa-money-bill-wave mr-2"></i> Amount</th>
            <th><i class="fas fa-calendar-alt mr-2"></i> Date</th>
          </tr>
        </thead>
        <tbody id="expensesTableBody">
          <tr>
            <td colspan="6" class="text-center" style="padding: 40px">
              <i
                class="fas fa-circle-notch fa-spin fa-2x text-primary"
                style="margin-bottom: 15px; display: block"
              ></i>
              Loading expenses...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
