<!-- Payment View -->
<div id="view-payment" class="view form-view">
  <!-- Modern Payment Header -->
  <div
    class="creative-expenses-header"
    style="background: linear-gradient(135deg, #170a3d 0%, #3a1f62 100%)"
  >
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="expenses-header-content">
      <h1>
        <i
          class="fas fa-money-check-alt"
          style="
            color: #fff;
            filter: drop-shadow(0 2px 4px rgba(255, 255, 255, 0.4));
          "
        ></i>
        Payment Management
      </h1>
      <p>Seamlessly log, track, and monitor incoming client payments.</p>
    </div>
  </div>

  <!-- Add Payment Card -->
  <div class="expenses-card">
    <div class="expenses-card-header">
      <h3>
        <span class="icon-square bg-emerald-light"
          ><i class="fas fa-plus"></i
        ></span>
        Log New Payment
      </h3>
      <div class="expense-info-badge">
        <i class="fas fa-magic"></i> Auto-matching enabled
      </div>
    </div>

    <form id="add-payment-form" class="creative-form">
      <div class="grid-responsive" style="gap: 25px">
        <div class="input-group">
          <label class="required-label">Stock #</label>
          <div class="modern-input-wrapper">
            <select
              name="payCarId"
              id="pay-car-id"
              class="form-control"
              required
            >
              <option value="">Select Stock #...</option>
            </select>
            <i class="fas fa-fingerprint"></i>
          </div>
        </div>

        <div class="input-group">
          <label class="required-label">Car Model</label>
          <div class="modern-input-wrapper">
            <select
              name="payCarModel"
              id="pay-car-model"
              class="form-control"
              required
            >
              <option value="">Select Model...</option>
            </select>
            <i class="fas fa-car-side"></i>
          </div>
        </div>

        <div class="input-group">
          <label class="required-label">Client Name</label>
          <div class="modern-input-wrapper">
            <select
              name="payClientName"
              id="pay-client-name"
              class="form-control"
              required
            >
              <option value="">Select Client...</option>
            </select>
            <i class="fas fa-user-tie"></i>
          </div>
        </div>

        <div class="input-group" style="grid-column: 1 / -1">
          <label class="required-label">Payment Option / Notes</label>
          <div class="modern-input-wrapper">
            <input
              type="text"
              name="payOption"
              id="pay-option"
              class="form-control"
              placeholder="E.g., Cash, Credit Card, Bank Transfer, Check, etc."
              required
            />
            <i class="fas fa-credit-card"></i>
          </div>
        </div>

        <div class="input-group">
          <label class="required-label">Amount ($)</label>
          <div class="modern-input-wrapper">
            <input
              type="number"
              name="payAmount"
              id="pay-amount"
              step="0.01"
              min="0"
              class="form-control"
              placeholder="0.00"
              required
            />
            <i class="fas fa-dollar-sign"></i>
          </div>
        </div>

        <div class="input-group">
          <label class="required-label">Payment Date</label>
          <div class="modern-input-wrapper">
            <input
              type="date"
              name="payDate"
              id="pay-date"
              class="form-control"
              required
            />
            <i class="fas fa-calendar-alt"></i>
          </div>
        </div>
      </div>

      <div style="margin-top: 30px; text-align: right">
        <button
          type="submit"
          class="btn-gradient-submit"
          style="
            background: linear-gradient(to right, #232754, #232754);
            box-shadow: 0 4px 15px rgba(78, 115, 223, 0.4);
            display: inline-flex;
          "
        >
          <i class="fas fa-check-circle"></i> Save Payment
        </button>
      </div>
    </form>
  </div>

  <!-- Recent Payments History Card -->
  <div class="expenses-card">
    <div
      class="expenses-card-header"
      style="
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        align-items: center;
        justify-content: space-between;
      "
    >
      <h3 style="margin: 0">
        <span class="icon-square bg-indigo-light"
          ><i class="fas fa-history"></i
        ></span>
        Recent Payments History
      </h3>
      <div
        style="
          display: flex;
          gap: 10px;
          flex-grow: 1;
          justify-content: flex-end;
        "
      >
        <div style="position: relative; max-width: 180px; width: 100%">
          <i
            class="fas fa-search"
            style="
              position: absolute;
              left: 12px;
              top: 50%;
              transform: translateY(-50%);
              color: #aaa;
            "
          ></i>
          <input
            type="text"
            id="paymentCarIdFilter"
            class="form-control"
            placeholder="Filter by ID..."
            onkeyup="filterPayments()"
            style="
              padding-left: 35px;
              border-radius: 20px;
              box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            "
          />
        </div>
        <div style="position: relative; max-width: 180px; width: 100%">
          <i
            class="fas fa-search"
            style="
              position: absolute;
              left: 12px;
              top: 50%;
              transform: translateY(-50%);
              color: #aaa;
            "
          ></i>
          <input
            type="text"
            id="paymentCarModelFilter"
            class="form-control"
            placeholder="Filter by Model..."
            onkeyup="filterPayments()"
            style="
              padding-left: 35px;
              border-radius: 20px;
              box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            "
          />
        </div>
        <div style="position: relative; max-width: 250px; width: 100%">
          <i
            class="fas fa-search"
            style="
              position: absolute;
              left: 12px;
              top: 50%;
              transform: translateY(-50%);
              color: #aaa;
            "
          ></i>
          <input
            type="text"
            id="paymentClientFilter"
            class="form-control"
            placeholder="Filter by Client Name..."
            onkeyup="filterPayments()"
            style="
              padding-left: 35px;
              border-radius: 20px;
              box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            "
          />
        </div>
        <button
          id="refresh-payments"
          class="btn btn-secondary"
          style="border-radius: 20px; font-size: 0.9rem; padding: 8px 15px"
        >
          <i class="fas fa-sync-alt"></i> Refresh Data
        </button>
      </div>
    </div>

    <div class="expenses-table-wrapper">
      <table class="creative-table">
        <thead>
          <tr>
            <th>CAR MODEL</th>
            <th>Stock #</th>
            <th>CLIENT NAME</th>
            <th>PAYMENT OPTION / NOTES</th>
            <th>AMOUNT</th>
            <th>PAYMENT DATE</th>
          </tr>
        </thead>
        <tbody id="payments-tbody">
          <tr>
            <td colspan="6" class="text-center" style="padding: 30px">
              <i
                class="fas fa-spinner fa-spin"
                style="
                  font-size: 24px;
                  color: #3498db;
                  margin-bottom: 10px;
                  display: block;
                "
              ></i>
              Loading records...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
